  @media(max-width:560px){
    .grid{gap:10px}
    .kpi{padding:14px 15px}

  }
</style>

function useRows(table, {order='created_at', asc=false, select='*', deps=[]}={}){
  const [rows,setRows]=useState(null); const [n,setN]=useState(0);
  const reload=useCallback(()=>setN(x=>x+1),[]);
  useEffect(()=>{ let live=true; (async()=>{
    setRows(null);
    let q=db.from(table).select(select); if(order) q=q.order(order,{ascending:asc});
    const {data,error}=await q; if(!live) return;
    if(error){ toast('Erro ao carregar: '+error.message,'err'); setRows([]); } else setRows(data||[]);
  })(); return ()=>{live=false;}; },[table,n,...deps]);
  return [rows,reload];
}

/* ========== RECUPERAÃ‡ÃƒO DE RECEITA ========== */

    const hoje=todayISO();
    const inativos=(cli||[]).map(c=>{ const b=by[c.id]; return {...c, dias:b&&b.last?daysBetween(b.last,hoje):null, total:b?b.total:0, n:b?b.n:0}; })
      .filter(c=>c.n>0 && c.dias!=null && c.dias>=60).sort((a,b)=>b.dias-a.dias);
    setD({inativos, orcamentos:(os||[]).filter(o=>o.status==='orcamento'), cancel:(os||[]).filter(o=>o.status==='cancelado')});
  })(); },[]);
  const msg=c=>encodeURIComponent('OlÃ¡ '+((c.nome||'').split(' ')[0])+'! Sentimos sua falta no ateliÃª. Faz um tempinho que vocÃª nÃ£o aparece â€” tem alguma peÃ§a esperando um ajuste? Estou Ã  disposiÃ§Ã£o. â€” '+(tenant?.nome||''));
  return html`<${Shell} title="RecuperaÃ§Ã£o de receita">
    <div class="hint">Reative clientes parados e resgate orÃ§amentos que nÃ£o fecharam â€” receita que jÃ¡ estava ao seu alcance.</div>
    ${!d? html`<div class="hint">Carregandoâ€¦</div>`: html`<${Fragment}>
      <div class="grid">
        <div class="glass kpi" style=${{cursor:'default'}}><div class="n">${d.inativos.length}</div><div class="l">Inativos (60+ dias)</div></div>
        <button class="kpi" onClick=${()=>go('/ordens?f=orcamento')}><div class="n">${d.orcamentos.length}</div><div class="l">OrÃ§amentos em aberto</div></button>
        <div class="glass kpi" style=${{cursor:'default'}}><div class="n" style=${{fontSize:'1.5rem'}}>${BRL(d.inativos.reduce((a,c)=>a+c.total,0))}</div><div class="l">JÃ¡ gasto pelos inativos</div></div>
        <button class="kpi" onClick=${()=>go('/ordens?f=cancelado')}><div class="n">${d.cancel.length}</div><div class="l">OS canceladas</div></button>
      </div>
      <div class="glass panel" style=${{marginTop:'18px'}}>
        <h3>Clientes para reconquistar</h3><p class="desc">Sem voltar hÃ¡ 60 dias ou mais â€” comece pelos que mais gastaram.</p>
        ${d.inativos.length===0? html`<${Empty} icon=${I.refresh} title="NinguÃ©m parado">Seus clientes estÃ£o ativos.</${Empty}>`
          : html`<div class="tblwrap"><table class="tbl"><thead><tr><th>Cliente</th><th class="r">Sem voltar</th><th class="r">ServiÃ§os</th><th class="r">Total gasto</th><th class="r">AÃ§Ã£o</th></tr></thead>
            <tbody>${d.inativos.map(c=>html`<tr key=${c.id}><td class="b">${c.nome}</td><td class="r">${c.dias} dias</td><td class="r">${c.n}</td><td class="r b">${BRL(c.total)}</td>
              <td class="r">${c.whatsapp? html`<a class="btn sm pri" target="_blank" href=${'https://wa.me/55'+onlyDigits(c.whatsapp)+'?text='+msg(c)}><${Ic} d=${I.wa}/>Reconquistar</a>`: html`<span class="muted" style=${{fontSize:'.72rem'}}>sem WhatsApp</span>`}</td></tr>`)}</tbody></table></div>`}
      </div>
    </${Fragment}>`}
  </${Shell}>`;
}

/* ========== ALAVANCAGEM ========== */
function Alavancagem(){
  const {tenant}=useApp();
  const [clientes]=useRows('clientes',{order:'nome',asc:true});
  const [servicos]=useRows('servicos',{order:'nome',asc:true});
  const [counts,setCounts]=useState({});
  const [seg,setSeg]=useState('todos'),[servId,setServId]=useState(''),[desc,setDesc]=useState(15);
  useEffect(()=>{ (async()=>{ const {data:os}=await db.from('ordens').select('cliente_id'); const m={}; (os||[]).forEach(o=>{ if(o.cliente_id) m[o.cliente_id]=(m[o.cliente_id]||0)+1; }); setCounts(m); })(); },[]);
  const serv=(servicos||[]).find(s=>s.id===servId);
  const preco=serv?Number(serv.preco_base):0, precoDesc=preco*(1-Number(desc||0)/100);
  const alvo=useMemo(()=>{ let list=(clientes||[]).filter(c=>c.whatsapp);
    if(seg==='aniversariantes') list=list.filter(bdayThisMonth);
    if(seg==='frequentes') list=list.filter(c=>(counts[c.id]||0)>=3);
    if(seg==='novos') list=list.filter(c=>(counts[c.id]||0)<=1);
    return list; },[clientes,seg,counts]);
  const msg=c=>encodeURIComponent('OlÃ¡ '+((c.nome||'').split(' ')[0])+'! Oferta especial pra vocÃª'
    +(serv? ' em '+serv.nome+': de '+BRL(preco)+' por '+BRL(precoDesc)+' ('+desc+'% off)':' aqui no ateliÃª')+'. Vamos agendar? â€” '+(tenant?.nome||''));
  return html`<${Shell} title="Alavancagem">
    <div class="hint">Gere mais receita da base atual: escolha um pÃºblico, um serviÃ§o e um desconto, e dispare a oferta por WhatsApp.</div>
    <div class="glass panel">
      <label>PÃºblico-alvo</label>
      <div class="seg" style=${{marginBottom:'10px'}}>
        ${[['todos','Todos'],['aniversariantes','Aniversariantes do mÃªs'],['frequentes','Frequentes (3+)'],['novos','Novos (1 visita)']].map(([k,l])=>html`<button key=${k} class=${'chip'+(seg===k?' on':'')} onClick=${()=>setSeg(k)}>${l}</button>`)}
      </div>
      <div class="f2">
        <div><label>ServiÃ§o em oferta</label><select value=${servId} onInput=${e=>setServId(e.target.value)}><option value="">â€” Oferta genÃ©rica â€”</option>${(servicos||[]).map(s=>html`<option key=${s.id} value=${s.id}>${s.nome} Â· ${BRL(s.preco_base)}</option>`)}</select></div>
        <div><label>Desconto (%)</label><input type="number" min="0" max="90" value=${desc} onInput=${e=>setDesc(e.target.value)}/></div>
      </div>
      ${serv&&html`<div class="notice" style=${{marginTop:'12px'}}>${serv.nome}: de <b>${BRL(preco)}</b> por <b>${BRL(precoDesc)}</b> (${desc}% off).</div>`}
    </div>
    <div class="glass panel" style=${{marginTop:'16px'}}>
      <h3>Clientes no pÃºblico (${alvo.length})</h3><p class="desc">Cada disparo abre o WhatsApp com a mensagem pronta.</p>
      ${alvo.length===0? html`<${Empty} icon=${I.rocket} title="Nenhum cliente">Ajuste o pÃºblico ou cadastre WhatsApp nos clientes.</${Empty}>`
        : html`<div class="tblwrap"><table class="tbl"><thead><tr><th>Cliente</th><th class="r">ServiÃ§os feitos</th><th class="r">Enviar oferta</th></tr></thead>
          <tbody>${alvo.map(c=>html`<tr key=${c.id}><td class="b">${c.nome}</td><td class="r">${counts[c.id]||0}</td>
            <td class="r"><a class="btn sm pri" target="_blank" href=${'https://wa.me/55'+onlyDigits(c.whatsapp)+'?text='+msg(c)}><${Ic} d=${I.wa}/>Oferecer</a></td></tr>`)}</tbody></table></div>`}
    </div>
  </${Shell}>`;
}

/* ========== ROUTER ========== */
function Router(){
  const h=useHash(); const [path]=h.split('?'); const seg=path.split('/').filter(Boolean);
  if(seg[0]==='clientes'&&seg[1]) return html`<${ClienteDetail} id=${seg[1]}/>`;
  if(seg[0]==='clientes') return html`<${Clientes}/>`;
  if(seg[0]==='ordens'&&seg[1]) return html`<${OrdemDetail} id=${seg[1]}/>`;
  if(seg[0]==='ordens') return html`<${Ordens}/>`;
  if(seg[0]==='servicos') return html`<${Servicos}/>`;
  if(seg[0]==='estoque') return html`<${Estoque}/>`;
  if(seg[0]==='financeiro') return html`<${Financeiro}/>`;
  if(seg[0]==='relatorios') return html`<${Relatorios}/>`;
  if(seg[0]==='fiscal') return html`<${Fiscal}/>`;
  if(seg[0]==='recuperacao') return html`<${Recuperacao}/>`;
  if(seg[0]==='alavancagem') return html`<${Alavancagem}/>`;
  if(seg[0]==='config') return html`<${Config}/>`;
  return html`<${Dashboard}/>`;
}

/* ========== ROOT ========== */
function App(){
  const [session,setSession]=useState(undefined);
  const [ctx,setCtx]=useState(null);
  useEffect(()=>{
    db.auth.getSession().then(({data})=>setSession(data.session));
    const { data:sub }=db.auth.onAuthStateChange((_e,s)=>setSession(s));
    return ()=>sub.subscription.unsubscribe();
  },[]);
  useEffect(()=>{ if(!session){ setCtx(null); return; } (async()=>{
    const [{data:m},{data:prof}]=await Promise.all([
      db.from('tenant_memberships').select('tenant_id,role').eq('user_id',session.user.id).eq('ativo',true).limit(1).maybeSingle(),
      db.from('profiles').select('*').eq('id',session.user.id).maybeSingle(),
    ]);
    let tenant=null;
    if(m?.tenant_id){ const {data:t}=await db.from('tenants').select('*').eq('id',m.tenant_id).maybeSingle(); tenant=t;
      const {data:st}=await db.from('tenant_settings').select('cor_primaria,cor_secundaria').eq('tenant_id',m.tenant_id).maybeSingle();
      if(st?.cor_primaria) document.documentElement.style.setProperty('--plum',st.cor_primaria);
      if(st?.cor_secundaria) document.documentElement.style.setProperty('--violet',st.cor_secundaria);
    }
    setCtx({ tenant, tenantId:m?.tenant_id, role:m?.role||'atendente', profile:prof||{nome:(session.user.email||'').split('@')[0]} });
  })(); },[session]);
  if(session===undefined) return html`<${Fragment}><${Toaster}/><div class="center"><div class="sub">Carregandoâ€¦</div></div></${Fragment}>`;
  if(!session) return html`<${Fragment}><${Toaster}/><${Login}/></${Fragment}>`;
  if(!ctx) return html`<${Fragment}><${Toaster}/><div class="center"><div class="sub">Preparando seu ateliÃªâ€¦</div></div></${Fragment}>`;
  return html`<${Ctx.Provider} value=${ctx}><${Toaster}/><${Router}/></${Ctx.Provider}>`;
}
ReactDOM.createRoot(document.getElementById('root')).render(createElement(App));
</script>
