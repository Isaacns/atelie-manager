<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Ateliê Manager — Costureira Salvador</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,500;0,600;0,700;1,500&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#f4efe8; --card:#fbf8f3; --ink:#2e2b31; --fg:#2e2b31; --muted:#8a7e86;
    --plum:#5e3a56; --plum-2:#4c2e46; --violet:#8e2cb0; --charcoal:#2e2b31;
    --gold:#c8a96a; --border:#e7ddd0; --danger:#b3452f; --ok:#3f7d52; --warn:#b98325;
    --radius:1rem; --shadow:0 8px 32px rgba(70,40,80,.10);
  }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%;overflow-x:hidden;max-width:100%}
  body{
    font-family:Inter,system-ui,sans-serif;color:var(--fg);background:var(--bg);
    background-image:
      radial-gradient(60rem 60rem at 110% -10%, rgba(142,44,176,.10), transparent 60%),
      radial-gradient(50rem 50rem at -10% 10%, rgba(200,169,106,.16), transparent 55%);
    background-attachment:fixed;-webkit-font-smoothing:antialiased;
  }
  .serif{font-family:"Cormorant Garamond",Georgia,serif}
  a{color:inherit}
  .center{min-height:100dvh;display:grid;place-items:center;padding:24px}
  .glass{background:rgba(251,248,243,.72);backdrop-filter:blur(18px);
    border:1px solid rgba(255,255,255,.5);box-shadow:var(--shadow);border-radius:1.25rem}
  /* logo */
  .mark{width:44px;height:28px;color:var(--charcoal)}
  @media (prefers-reduced-motion:no-preference){.breathe{animation:br 4.5s ease-in-out infinite;transform-origin:center}}
  @keyframes br{0%,100%{transform:scale(1);opacity:1}50%{transform:scale(1.045);opacity:.92}}
  .logo-badge{width:96px;height:96px;border-radius:999px;background:
    radial-gradient(120% 120% at 30% 20%, #3a363f, #2b282e 70%);
    display:grid;place-items:center;box-shadow:0 10px 30px rgba(46,43,49,.35);margin:0 auto}
  .logo-badge .mark{width:60px;height:38px;color:#fff}
  /* login */
  .card{width:100%;max-width:420px;padding:32px}
  h1.title{font-family:"Cormorant Garamond",serif;font-size:2rem;margin:.4rem 0 .1rem;text-align:center}
  .sub{color:var(--muted);text-align:center;font-size:.9rem;margin-bottom:20px}
  label{display:block;font-size:.82rem;font-weight:600;margin:14px 0 6px;color:#5a525c}
  .field{position:relative}
  input,select,textarea{width:100%;height:44px;border:1px solid var(--border);background:rgba(255,255,255,.75);
    border-radius:.6rem;padding:0 14px;font-size:.95rem;color:var(--fg);outline:none;font-family:inherit}
  textarea{height:auto;padding:10px 14px;resize:vertical;min-height:72px}
  input:focus,select:focus,textarea:focus{border-color:var(--plum);box-shadow:0 0 0 3px rgba(94,58,86,.15)}
  .toggle{position:absolute;right:6px;top:6px;height:32px;width:auto;padding:0 10px;border:0;background:transparent;
    color:var(--muted);cursor:pointer;font-size:.78rem}
  button.primary{width:100%;height:46px;margin-top:8px;border:0;border-radius:.6rem;
    background:var(--plum);color:#fff;font-weight:600;font-size:.95rem;cursor:pointer;transition:.15s}
  button.primary:hover{background:var(--plum-2)}
  button.primary:disabled{opacity:.6;cursor:default}
  .err{background:rgba(179,69,47,.1);border:1px solid rgba(179,69,47,.3);color:var(--danger);
    border-radius:.5rem;padding:10px 12px;font-size:.85rem;margin-bottom:8px}
  .foot{color:var(--muted);text-align:center;font-size:.72rem;margin-top:18px;letter-spacing:.02em}
  /* app shell */
  .app{display:grid;grid-template-columns:236px 1fr;min-height:100dvh}
  .side{position:sticky;top:0;z-index:20;height:100dvh;padding:20px 14px;border-right:1px solid var(--border);
    background:rgba(248,244,238,.75);backdrop-filter:blur(16px);display:flex;flex-direction:column;gap:4px}
  .side .brand{display:flex;align-items:center;gap:10px;padding:6px 8px 16px}
  .side .brand .nm{font-family:"Cormorant Garamond",serif;font-size:1.15rem;line-height:1;font-weight:600}
  .side .brand .tg{font-size:.6rem;letter-spacing:.16em;text-transform:uppercase;color:var(--muted)}
  .nav{display:flex;flex-direction:column;gap:2px;overflow:visible}
  .nav a{position:relative;display:flex;align-items:center;gap:11px;padding:10px 12px;border-radius:.6rem;
    font-size:.9rem;font-weight:500;color:#5a525c;text-decoration:none;cursor:pointer;transition:.12s}
  .nav a:hover{background:rgba(142,44,176,.07);color:var(--plum)}
  .nav a.on{background:var(--plum);color:#fff}
  .nav a.on svg{color:#fff}
  .nav a svg{width:18px;height:18px;color:var(--muted);flex:0 0 auto}
  .nav a:hover svg{color:var(--plum)}
  .nav .sep{font-size:.62rem;letter-spacing:.14em;text-transform:uppercase;color:#b6a9b1;padding:14px 12px 4px}
  .side .who{margin-top:auto;padding-top:12px;border-top:1px solid var(--border);font-size:.78rem;color:var(--muted)}
  .side .who b{color:var(--fg);display:block;font-size:.85rem}
  .side .who button{margin-top:8px;width:100%;height:34px;border:1px solid var(--border);background:rgba(255,255,255,.6);
    border-radius:.5rem;cursor:pointer;color:var(--fg);font-size:.82rem}
  .side .who button:hover{border-color:var(--plum);color:var(--plum)}
  /* content */
  .main{min-width:0}
  .topbar{position:sticky;top:0;z-index:4;display:flex;align-items:center;gap:12px;height:62px;padding:0 24px;
    background:rgba(244,239,232,.8);backdrop-filter:blur(16px);border-bottom:1px solid var(--border)}
  .topbar h2{font-family:"Cormorant Garamond",serif;font-size:1.5rem;margin:0;font-weight:600}
  .topbar .plan{margin-left:6px;font-size:.68rem;padding:3px 9px;border-radius:999px;background:rgba(142,44,176,.1);color:var(--violet);font-weight:600}
  .topbar .spacer{margin-left:auto}
  .wrap{max-width:1120px;margin:0 auto;padding:26px 24px 60px}
  .hi{font-family:"Cormorant Garamond",serif;font-size:2rem;margin:0}
  .hint{color:var(--muted);font-size:.92rem;margin:2px 0 20px}
  /* kpis */
  .grid{display:grid;grid-template-columns:repeat(2,1fr);gap:14px}
  @media(min-width:820px){.grid{grid-template-columns:repeat(4,1fr)}}
  .kpi{padding:18px 20px;border-radius:1.1rem;text-align:left;cursor:pointer;border:0;background:rgba(251,248,243,.72);
    backdrop-filter:blur(18px);box-shadow:var(--shadow);transition:.15s;font-family:inherit}
  .kpi:hover{transform:translateY(-2px);box-shadow:0 14px 38px rgba(70,40,80,.14)}
  .kpi .n{font-family:"Cormorant Garamond",serif;font-size:2.1rem;line-height:1;color:var(--plum)}
  .kpi .l{color:var(--muted);font-size:.82rem;margin-top:6px}
  .kpi.warn .n{color:var(--warn)} .kpi.ok .n{color:var(--ok)}
  /* cards / sections */
  .row{display:grid;gap:16px;margin-top:18px}
  @media(min-width:820px){.row.two{grid-template-columns:1fr 1fr}.row.side{grid-template-columns:1.6fr 1fr}}
  .panel{padding:20px;border-radius:1.1rem}
  .panel h3{margin:0 0 2px;font-size:1rem;font-weight:600}
  .panel .desc{color:var(--muted);font-size:.82rem;margin:0 0 14px}
  /* toolbar */
  .bar{display:flex;gap:10px;align-items:center;flex-wrap:wrap;margin-bottom:16px}
  .bar .search{flex:1;min-width:200px}
  .bar input,.bar select{height:42px}
  .btn{height:42px;padding:0 16px;border-radius:.6rem;border:1px solid var(--border);background:rgba(255,255,255,.65);
    color:var(--fg);font-weight:600;font-size:.88rem;cursor:pointer;display:inline-flex;align-items:center;gap:7px;font-family:inherit;white-space:nowrap}
  .btn:hover{border-color:var(--plum);color:var(--plum)}
  .btn.pri{background:var(--plum);border-color:var(--plum);color:#fff}
  .btn.pri:hover{background:var(--plum-2)}
  .btn.sm{height:34px;padding:0 12px;font-size:.82rem}
  .btn.ghost{background:transparent;border-color:transparent}
  .btn svg{width:16px;height:16px}
  .link{background:none;border:0;color:var(--plum);cursor:pointer;font-weight:600;font-size:.85rem;padding:0;font-family:inherit;text-decoration:underline;text-underline-offset:2px}
  /* table */
  .tbl{width:100%;border-collapse:collapse;font-size:.88rem}
  .tbl th{text-align:left;font-weight:600;color:var(--muted);font-size:.74rem;text-transform:uppercase;letter-spacing:.04em;
    padding:0 12px 10px;border-bottom:1px solid var(--border)}
  .tbl td{padding:12px;border-bottom:1px solid rgba(231,221,208,.6);vertical-align:middle}
  .tbl tr:last-child td{border-bottom:0}
  .tbl tr.click{cursor:pointer}
  .tbl tr.click:hover td{background:rgba(142,44,176,.05)}
  .tbl .r{text-align:right}
  .tbl .low td{background:rgba(185,131,37,.07)}
  .tblwrap{overflow-x:auto}
  /* badge */
  .badge{display:inline-flex;align-items:center;gap:6px;font-size:.74rem;font-weight:600;padding:4px 10px;border-radius:999px;white-space:nowrap}
  .dot{width:7px;height:7px;border-radius:999px;background:currentColor;opacity:.9}
  /* modal */
  .ov{position:fixed;inset:0;background:rgba(46,43,49,.42);backdrop-filter:blur(3px);display:grid;place-items:center;padding:20px;z-index:20}
  .modal{width:100%;max-width:560px;max-height:90dvh;overflow:auto;background:var(--card);border-radius:1.1rem;
    box-shadow:0 24px 70px rgba(46,43,49,.3);border:1px solid rgba(255,255,255,.6)}
  .modal .mh{position:sticky;top:0;background:var(--card);display:flex;align-items:center;justify-content:space-between;
    padding:20px 22px 12px;border-bottom:1px solid var(--border)}
  .modal .mh h3{margin:0;font-family:"Cormorant Garamond",serif;font-size:1.35rem;font-weight:600}
  .modal .mb{padding:18px 22px}
  .modal .mf{position:sticky;bottom:0;background:var(--card);display:flex;gap:10px;justify-content:flex-end;padding:14px 22px;border-top:1px solid var(--border)}
  .x{border:0;background:transparent;font-size:1.3rem;color:var(--muted);cursor:pointer;line-height:1}
  .f2{display:grid;grid-template-columns:1fr 1fr;gap:0 14px}
  .f3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:0 14px}
  @media(max-width:560px){.f2,.f3{grid-template-columns:1fr}}
  .ferr{color:var(--danger);font-size:.78rem;margin-top:4px}
  /* empty */
  .empty{text-align:center;padding:44px 20px;color:var(--muted)}
  .empty .em{width:44px;height:44px;margin:0 auto 10px;color:#c9bcc3}
  .empty h4{margin:0 0 4px;color:var(--fg);font-weight:600}
  /* toast */
  .toasts{position:fixed;right:18px;bottom:18px;display:flex;flex-direction:column;gap:8px;z-index:40}
  .toast{background:var(--ink);color:#fff;padding:12px 16px;border-radius:.6rem;font-size:.86rem;box-shadow:0 10px 30px rgba(0,0,0,.25);max-width:320px}
  .toast.ok{background:var(--ok)} .toast.err{background:var(--danger)}
  /* misc */
  .stat-list{display:flex;flex-direction:column;gap:2px}
  .stat-list .it{display:flex;align-items:center;justify-content:space-between;padding:9px 4px;border-bottom:1px solid rgba(231,221,208,.6);font-size:.88rem}
  .stat-list .it:last-child{border-bottom:0}
  .stat-list .it .v{font-weight:600;color:var(--plum)}
  .muted{color:var(--muted)} .b{font-weight:600}
  .tag{display:inline-block;font-size:.72rem;padding:3px 8px;border-radius:.4rem;background:rgba(94,58,86,.08);color:var(--plum);font-weight:600}
  .notice{background:rgba(142,44,176,.06);border:1px solid rgba(142,44,176,.18);border-radius:.7rem;padding:14px 16px;font-size:.85rem;color:#5a525c}
  .notice b{color:var(--plum)}
  .chk{display:flex;gap:9px;align-items:flex-start;padding:7px 0;font-size:.88rem}
  .chk .m{width:18px;height:18px;flex:0 0 auto;color:var(--muted)}
  /* living background — padrão VIZIO (adaptado à paleta Costureira) */
  .living{position:fixed;inset:0;z-index:0;overflow:hidden;pointer-events:none}
  .living .orb{position:absolute;border-radius:50%;filter:blur(64px)}
  .living .orb.a{width:540px;height:540px;left:-150px;top:-110px;background:radial-gradient(circle,rgba(142,44,176,.72),transparent 66%)}
  .living .orb.b{width:470px;height:470px;right:-130px;top:22%;background:radial-gradient(circle,rgba(142,44,176,.56),transparent 68%)}
  .living .orb.c{width:620px;height:620px;left:22%;bottom:-250px;background:radial-gradient(circle,rgba(142,44,176,.64),transparent 68%)}
  @media (prefers-reduced-motion:no-preference){
    .living .orb.a{animation:orbB 8s ease-in-out infinite}
    .living .orb.b{animation:orbB 8s ease-in-out infinite -2.5s}
    .living .orb.c{animation:orbB 8s ease-in-out infinite -5s}
    @keyframes orbB{0%,100%{transform:scale(1) translate(0,0);opacity:.58}50%{transform:scale(1.17) translate(14px,-20px);opacity:.82}}
  }
  .center,.app{position:relative;z-index:1}
  .app{background:transparent}
  /* brand logos */
  .brandmark{border-radius:50%;object-fit:cover;display:block;box-shadow:0 0 0 2px var(--cream),0 0 0 4px rgba(142,44,176,.5),0 8px 22px rgba(46,43,49,.28)}
  .story-ring{display:inline-grid;place-items:center;border-radius:50%;padding:3px;background:conic-gradient(from 210deg,#8e2cb0,#c86ee0 25%,#8e2cb0 55%,#5e3a56 80%,#8e2cb0);box-shadow:0 6px 18px rgba(142,44,176,.28)}
  .story-ring .brandmark{box-shadow:none;border:2.5px solid var(--cream)}
  @media (prefers-reduced-motion:no-preference){.breathe-img{animation:imgBr 4.6s ease-in-out infinite;transform-origin:center}}
  @keyframes imgBr{0%,100%{transform:scale(1)}50%{transform:scale(1.055)}}
  .byvizio{display:inline-flex;align-items:center;gap:6px;color:var(--muted);font-size:.72rem}
  .byvizio img{height:15px;width:auto}
  .byvizio b{font-weight:600}
  @media (prefers-reduced-motion:no-preference){.vzfloat{animation:vzF 5s ease-in-out infinite}}
  @keyframes vzF{0%,100%{transform:translateY(0)}50%{transform:translateY(-2.5px)}}
  /* chart */
  .chartbox{height:158px;position:relative}
  /* measures + segments */
  .measure-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:0 12px}
  @media(max-width:560px){.measure-grid{grid-template-columns:1fr 1fr}}
  .seg{display:inline-flex;gap:6px;flex-wrap:wrap}
  .chip{border:1px solid var(--border);background:rgba(255,255,255,.6);border-radius:999px;padding:7px 13px;font-size:.82rem;cursor:pointer;font-family:inherit;color:var(--fg);font-weight:500}
  .chip.on{background:var(--plum);border-color:var(--plum);color:#fff}
  /* alerts balloon */
  .bell-badge{position:absolute;top:-5px;right:-5px;background:var(--danger);color:#fff;font-size:.62rem;font-weight:700;min-width:16px;height:16px;border-radius:999px;display:grid;place-items:center;padding:0 3px}
  .pop{position:absolute;right:0;top:46px;width:310px;max-height:66vh;overflow:auto;background:var(--card);border:1px solid var(--border);border-radius:.8rem;box-shadow:0 18px 50px rgba(46,43,49,.25);z-index:30}
  .pop-h{padding:12px 14px;font-weight:600;border-bottom:1px solid var(--border)}
  .pop-empty{padding:22px 14px;color:var(--muted);font-size:.86rem;text-align:center}
  .pop-it{display:flex;gap:10px;align-items:flex-start;width:100%;text-align:left;padding:11px 14px;border:0;border-bottom:1px solid rgba(231,221,208,.6);background:transparent;cursor:pointer;font-family:inherit;font-size:.83rem;line-height:1.35}
  .pop-it:last-child{border-bottom:0} .pop-it:hover{background:rgba(142,44,176,.05)}
  .pi-ic{width:26px;height:26px;border-radius:7px;display:grid;place-items:center;flex:0 0 auto}
  .pi-ic svg{width:15px;height:15px} .pi-ic.warn{background:rgba(185,131,37,.15);color:var(--warn)} .pi-ic.low{background:rgba(142,44,176,.12);color:var(--violet)}
  /* billing gate */
  .gate-bar{position:sticky;top:0;z-index:8;display:flex;gap:12px;align-items:center;justify-content:center;flex-wrap:wrap;padding:10px 16px;font-size:.85rem;font-weight:600;color:#5a3d16;background:linear-gradient(90deg,#fbf1dc,#fce9c0,#fbf1dc);border-bottom:1px solid #f0d69a}
  .gate-bar.info{color:#4c2e46;background:linear-gradient(90deg,#f2e9f4,#ecdcf0,#f2e9f4);border-bottom:1px solid rgba(142,44,176,.25)}
  .gate-bar .gd{width:8px;height:8px;border-radius:50%;background:#b98325}
  .gate-bar.info .gd{background:var(--violet)}
  .gate-bar .gb{cursor:pointer;border:0;background:var(--ink);color:#fff;font-weight:700;font-size:.8rem;padding:6px 14px;border-radius:8px;font-family:inherit}
  .gate-bar.info .gb{background:var(--plum)}
  .gate-ov{position:fixed;inset:0;z-index:9000;display:grid;place-items:center;padding:24px;background:radial-gradient(120% 120% at 50% -10%,rgba(142,44,176,.24),rgba(46,43,49,.6) 60%);backdrop-filter:blur(7px)}
  .gate-card{position:relative;max-width:430px;width:100%;background:var(--card);border-radius:20px;padding:34px 30px 26px;text-align:center;border:1px solid rgba(255,255,255,.6);box-shadow:0 24px 70px rgba(46,43,49,.35)}
  .gate-ring{width:60px;height:60px;margin:0 auto 14px;border-radius:50%;display:grid;place-items:center;background:linear-gradient(135deg,var(--violet),var(--plum))}
  .gate-ring svg{width:26px;height:26px}
  .gate-price{font-size:.74rem;font-weight:700;letter-spacing:.04em;text-transform:uppercase;color:var(--violet);margin-bottom:10px}
  .gate-card h3{margin:0 0 6px;font-family:"Cormorant Garamond",serif;font-size:1.5rem;font-weight:600;color:var(--ink)}
  .gate-card p{margin:0 auto 18px;font-size:.9rem;color:#5f5760;max-width:330px}
  .gate-btn{border:0;cursor:pointer;background:var(--plum);color:#fff;font-weight:700;font-size:.96rem;padding:13px 26px;border-radius:11px;font-family:inherit;box-shadow:0 10px 26px rgba(94,58,86,.34)}
  .gate-btn:hover{background:var(--plum-2)}
  .gate-exit{display:block;margin:14px auto 0;background:0;border:0;font-size:.78rem;color:var(--muted);cursor:pointer;font-family:inherit}
  /* mobile nav */
  .menu-btn{display:none}
  @media(max-width:820px){
    .app{grid-template-columns:1fr}
    .side{position:fixed;left:0;top:0;height:100dvh;overflow:auto;z-index:30;width:264px;transform:translateX(-100%);transition:.2s}
    .side.open{transform:none}
    .menu-btn{display:inline-flex}
    .backdrop{position:fixed;inset:0;background:rgba(46,43,49,.4);z-index:25}
    .wrap{padding:20px 14px 64px}
    .topbar{padding:0 12px;gap:8px}
    .topbar h2{font-size:1.2rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;min-width:0}
    .row.side,.row.two{grid-template-columns:1fr}
  }
  @media(max-width:560px){
    .grid{gap:10px}
    .kpi{padding:14px 15px}
    .kpi .n{font-size:1.7rem}
    .hi{font-size:1.55rem}
    .panel{padding:16px}
    .glass.kpi .n[style]{font-size:1.25rem!important}
    .tbl{font-size:.82rem}
    .tbl th,.tbl td{padding:9px 7px}
    .modal .mh,.modal .mf{padding-left:16px;padding-right:16px}
    .modal .mb{padding:16px}
    .bar{gap:8px}
    .bar .btn.pri{flex:1;justify-content:center}
    .measure-grid{grid-template-columns:1fr 1fr}
    .topbar h2{font-size:1.05rem}
  }
</style>
</head>
<body>
<div id="root" class="center"><div class="sub">Carregando…</div></div>

<script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<script type="module">
import htm from 'https://esm.sh/htm@3.1.1';
const { createElement, useState, useEffect, useMemo, useCallback, useRef, Fragment } = React;
const html = htm.bind(createElement);

const SUPABASE_URL = 'https://emyjzjadmxgbtmxnzazu.supabase.co';
const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVteWp6amFkbXhnYnRteG56YXp1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODIxNTc4MzAsImV4cCI6MjA5NzczMzgzMH0.czJkQRNmGeWCt2fGiIxxssG0b9a7HEx2sDVLycaHVkI';

const MiniChart = ({labels,data,fmt}) => {
  const ref=useRef(null), inst=useRef(null);
  useEffect(()=>{ if(!window.Chart||!ref.current) return;
    if(inst.current) inst.current.destroy();
    inst.current=new window.Chart(ref.current,{type:'bar',
      data:{labels,datasets:[{data,backgroundColor:'#8e2cb0',hoverBackgroundColor:'#5e3a56',borderRadius:6,maxBarThickness:36}]},
      options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{callbacks:{label:c=>(fmt?fmt(c.raw):c.raw)}}},
      scales:{y:{beginAtZero:true,ticks:{maxTicksLimit:4,font:{size:10},callback:v=>'R$ '+v},grid:{color:'rgba(94,58,86,.08)'}},x:{grid:{display:false},ticks:{font:{size:11}}}}}});
    return ()=>{ if(inst.current){inst.current.destroy();inst.current=null;} };
  },[labels.join(),data.join()]);
  return html`<div class="chartbox"><canvas ref=${ref}></canvas></div>`;
};

let pushToast=()=>{};
function Toaster(){
  const [ts,setTs]=useState([]);
  useEffect(()=>{ pushToast=(msg,kind='')=>{ const id=Math.random(); setTs(x=>[...x,{id,msg,kind}]); setTimeout(()=>setTs(x=>x.filter(t=>t.id!==id)),3400); }; },[]);
  return html`<div class="toasts">${ts.map(t=>html`<div key=${t.id} class=${'toast '+t.kind}>${t.msg}</div>`)}</div>`;
}
const toast=(m,k)=>pushToast(m,k);

}

function Login(){
  const [usuario,setUsuario]=useState(''),[senha,setSenha]=useState(''),[show,setShow]=useState(false),[err,setErr]=useState(''),[busy,setBusy]=useState(false);
  async function submit(e){ e.preventDefault(); setErr(''); setBusy(true);
    try{
      const u=usuario.trim();
      if(!u){ setErr('Informe o e-mail ou usuário.'); setBusy(false); return; }
      let mail=u;
      if(u.indexOf('@')<0){
        const { data:m, error:re } = await db.rpc('login_email',{ p_user:u });
        if(re || !m){ setBusy(false); setErr('E-mail/usuário ou senha incorretos.'); return; }
        mail=m;
      }
      const { error } = await db.auth.signInWithPassword({ email:mail, password:senha });
      setBusy(false); if(error) setErr('E-mail/usuário ou senha incorretos.');
    }catch(_){ setBusy(false); setErr('Não foi possível entrar. Tente novamente.'); }
  }
  return html`<${Fragment}><${LivingBg}/><div class="center"><div class="glass card">
    <div style=${{display:'grid',placeItems:'center',marginBottom:'10px'}}><${BrandLogo} size=${120}/></div>
    <h1 class="title">Bem-vinda de volta</h1>
    <div class="sub">Acesse o painel do seu ateliê.</div>
    <form onSubmit=${submit}>
      ${err&&html`<div class="err">${err}</div>`}
      <label>E-mail ou usuário</label>
      <input type="text" autocomplete="username" autocapitalize="none" autocorrect="off" spellcheck="false" placeholder="seu e-mail ou usuário" value=${usuario} onInput=${e=>setUsuario(e.target.value)} required/>
      <label>Senha</label>
      <div class="field">
        <input type=${show?'text':'password'} autocomplete="current-password" placeholder="••••••••" value=${senha} onInput=${e=>setSenha(e.target.value)} required/>
        <button type="button" class="toggle" onClick=${()=>setShow(s=>!s)}>${show?'ocultar':'mostrar'}</button>
      </div>
      <button class="primary" disabled=${busy}>${busy?'Entrando…':'Entrar'}</button>
    </form>
    <div class="foot"><${ByVizio} dark=${true}/></div>
  </div></div></${Fragment}>`;
}

function AlertsBell(){
  const [open,setOpen]=useState(false);
  const [al,setAl]=useState({late:[],low:[]});
  useEffect(()=>{ (async()=>{
    const [{data:os},{data:pr}]=await Promise.all([
      db.from('ordens').select('id,numero,descricao,status,prazo,data_entrada,dias_previstos'),
      db.from('estoque_produtos').select('id,nome,quantidade,quantidade_minima,unidade'),
    ]);
    setAl({ late:(os||[]).filter(isLate), low:(pr||[]).filter(p=>Number(p.quantidade)<=Number(p.quantidade_minima)) });
  })(); },[]);
  const n=al.late.length+al.low.length;
  return html`<div style=${{position:'relative'}}>
    <button class="btn ghost sm" style=${{position:'relative'}} title="Avisos" onClick=${()=>setOpen(o=>!o)}><${Ic} d=${I.bell}/>${n>0&&html`<span class="bell-badge">${n}</span>`}</button>
    ${open&&html`<div class="pop">
      <div class="pop-h">Avisos ${n>0?'('+n+')':''}</div>
      ${n===0&&html`<div class="pop-empty">Tudo em dia ✓</div>`}
      ${al.late.map(o=>html`<button class="pop-it" key=${'l'+o.id} onClick=${()=>{setOpen(false);go('/ordens/'+o.id);}}>
        <span class="pi-ic warn"><${Ic} d=${I.alert}/></span><span><b>OS #${o.numero}</b> atrasada<br/><span class="muted">${o.descricao||'serviço'} · venc. ${fmtDate(dueDate(o))}</span></span></button>`)}
      ${al.low.map(p=>html`<button class="pop-it" key=${'e'+p.id} onClick=${()=>{setOpen(false);go('/estoque');}}>
        <span class="pi-ic low"><${Ic} d=${I.box}/></span><span><b>${p.nome}</b> em baixa<br/><span class="muted">${p.quantidade} ${p.unidade} (mín. ${p.quantidade_minima})</span></span></button>`)}
    </div>`}
  </div>`;
}

  const hash=useHash(); const base='/'+((hash.split('?')[0]).split('/')[1]||'');
  const [open,setOpen]=useState(false);
  const can = it => it.admin ? !!isAdmin : (!it.roles || it.roles.includes(role));
  useEffect(()=>{ setOpen(false); },[hash]);
  return html`<div class="app">
    <${LivingBg}/>
    ${open&&html`<div class="backdrop" onClick=${()=>setOpen(false)}/>`}
    <aside class=${'side'+(open?' open':'')}>

    </aside>

        <button class="btn ghost menu-btn sm" onClick=${()=>setOpen(true)}><${Ic} d=${I.menu}/></button>

    </div></div>`;
}

/* ---------- data hook ---------- */
function useRows(table, {order='created_at', asc=false, select='*', deps=[]}={}){
  const [rows,setRows]=useState(null); const [n,setN]=useState(0);
  const reload=useCallback(()=>setN(x=>x+1),[]);
  useEffect(()=>{ let live=true; (async()=>{
    setRows(null);
    let q=db.from(table).select(select); if(order) q=q.order(order,{ascending:asc});
    const {data,error}=await q; if(!live) return;
    if(error){ toast('Erro ao carregar: '+error.message,'err'); setRows([]); } else setRows(data||[]);
  })(); return ()=>{live=false;}; },[table,n,...deps]);
  return [rows,reload];
}

  const set=(k,v)=>setF(x=>({...x,[k]:v}));
  const setMed=(k,v)=>setF(x=>({...x,medidas:{...(x.medidas||{}),[k]:v}}));
  async function save(){ const e={}; if(!f.nome||f.nome.trim().length<2) e.nome='Informe o nome.'; setErr(e); if(Object.keys(e).length) return;
    setBusy(true);
    const payload={ tenant_id:tenantId, nome:f.nome.trim(), telefone:f.telefone||null, whatsapp:f.whatsapp||null,
      cpf:f.cpf?onlyDigits(f.cpf):null, nascimento:f.nascimento||null, cep:f.cep||null, endereco:f.endereco||null,
      bairro:f.bairro||null, cidade:f.cidade||null,
      medidas:(f.medidas&&Object.values(f.medidas).some(v=>v!==''&&v!=null))?f.medidas:null,

    const res = row?.id ? await db.from('clientes').update(payload).eq('id',row.id) : await db.from('clientes').insert(payload);

      <div><label>Bairro</label><input value=${f.bairro||''} onInput=${e=>set('bairro',e.target.value)}/></div>
    </div>

      <div><label>Cidade</label><input value=${f.cidade||''} onInput=${e=>set('cidade',e.target.value)} placeholder="Salvador"/></div>

/* ========== ORDENS ========== */
function OrdemForm({row,onClose,onSaved,tenantId,clientes,servicos,usuarios=[]}){
  const [f,setF]=useState(()=>({cliente_id:'',servico_id:'',descricao:'',valor:'',status:'aberto',data_entrada:todayISO(),prazo:'',dias_previstos:'',responsavel_id:'',observacoes:'',...(row||{})}));
  const [err,setErr]=useState({}),[busy,setBusy]=useState(false);
  const set=(k,v)=>setF(x=>({...x,[k]:v}));
  function pickServ(sid){ const s=servicos.find(x=>x.id===sid); setF(x=>({...x,servico_id:sid, descricao:x.descricao||(s?s.nome:''), valor:x.valor||(s?s.preco_base:'')})); }
  async function save(){ const e={}; if(!f.descricao||!f.descricao.trim()) e.descricao='Descreva o serviço.'; if(f.valor===''||isNaN(Number(f.valor))) e.valor='Informe o valor.'; setErr(e); if(Object.keys(e).length) return;
    setBusy(true);
    const dias=f.dias_previstos?Number(f.dias_previstos):null;
    const prazoCalc=f.prazo || (dias?addDays(f.data_entrada||todayISO(),dias):null);
    const payload={ tenant_id:tenantId, cliente_id:f.cliente_id||null, descricao:f.descricao.trim(), valor:Number(f.valor)||0,
      status:f.status, data_entrada:f.data_entrada||todayISO(), prazo:prazoCalc, dias_previstos:dias, responsavel_id:f.responsavel_id||null, observacoes:f.observacoes||null };
    if(!isClosed(payload.status) && payload.status==='entregue'){} // entregue set below
    let res, ordemId=row?.id;
    if(row?.id){ if(f.status==='entregue'&&row.status!=='entregue') payload.entregue_em=new Date().toISOString();
      res=await db.from('ordens').update(payload).eq('id',row.id); }
    else { if(f.status==='entregue') payload.entregue_em=new Date().toISOString();
      const ins=await db.from('ordens').insert(payload).select('id').maybeSingle(); res=ins; ordemId=ins.data?.id; }

  const [rows,reload]=useRows('estoque_produtos',{order:'nome',asc:true});
  const [q,setQ]=useState(''),[edit,setEdit]=useState(null),[mov,setMov]=useState(null),[del,setDel]=useState(null),[low,setLow]=useState(false);
  const filtered=useMemo(()=>{ if(!rows) return null; const s=q.toLowerCase();
    return rows.filter(p=>(!s||(p.nome||'').toLowerCase().includes(s)||(p.categoria||'').toLowerCase().includes(s))&&(!low||Number(p.quantidade)<=Number(p.quantidade_minima))); },[rows,q,low]);
  const lowCount=(rows||[]).filter(p=>Number(p.quantidade)<=Number(p.quantidade_minima)).length;
  return html`<${Shell} title="Estoque">
    <div class="bar">
      <div class="search"><input placeholder="Buscar item ou categoria…" value=${q} onInput=${e=>setQ(e.target.value)}/></div>
      <button class=${'btn'+(low?' pri':'')} onClick=${()=>setLow(l=>!l)}><${Ic} d=${I.alert}/>Estoque baixo${lowCount?' ('+lowCount+')':''}</button>
      <button class="btn pri" onClick=${()=>setEdit({})}><${Ic} d=${I.plus}/>Novo item</button>
    </div>
    <div class="glass panel">
      ${!filtered? html`<div class="hint">Carregando…</div>`
        : filtered.length===0? html`<${Empty} icon=${I.box} title=${q||low?'Nada encontrado':'Estoque vazio'}>${q||low?'Ajuste os filtros.':'Cadastre linhas, agulhas e insumos.'}</${Empty}>`
        : html`<div class="tblwrap"><table class="tbl"><thead><tr><th>Item</th><th>Categoria</th><th class="r">Saldo</th><th class="r">Mín.</th><th class="r">Valor</th><th class="r">Ações</th></tr></thead>
          <tbody>${filtered.map(p=>{ const lo=Number(p.quantidade)<=Number(p.quantidade_minima);
            return html`<tr key=${p.id} class=${lo?'low':''}><td class="b">${p.nome}</td><td class="muted">${p.categoria||'—'}</td>
              <td class="r b" style=${lo?{color:'var(--warn)'}:null}>${p.quantidade} ${p.unidade}${lo?' ⚠':''}</td>
              <td class="r muted">${p.quantidade_minima}</td><td class="r">${BRL(p.preco)}</td>
              <td class="r"><button class="btn sm" onClick=${()=>setMov(p)}>Movimentar</button>
                <button class="btn sm ghost" onClick=${()=>setEdit(p)}><${Ic} d=${I.edit}/></button>
                <button class="btn sm ghost" onClick=${()=>setDel(p)}><${Ic} d=${I.trash}/></button></td></tr>`; })}</tbody></table></div>`}
    </div>
    ${edit&&html`<${ProdutoForm} row=${edit.id?edit:null} tenantId=${tenantId} onClose=${()=>setEdit(null)} onSaved=${()=>{setEdit(null);reload();}}/>`}
    ${mov&&html`<${MovForm} produto=${mov} tenantId=${tenantId} onClose=${()=>setMov(null)} onSaved=${()=>{setMov(null);reload();}}/>`}
    ${del&&html`<${Confirm} danger text=${'Excluir '+del.nome+'?'} onClose=${()=>setDel(null)}
      onYes=${async()=>{const{error}=await db.from('estoque_produtos').delete().eq('id',del.id);if(error)toast('Erro: '+error.message,'err');else{toast('Item excluído.','ok');reload();}}}/>`}
  </${Shell}>`;
}

/* ========== FINANCEIRO ========== */
function LancForm({row,onClose,onSaved,tenantId,categorias}){
  const [f,setF]=useState(()=>({tipo:'receita',categoria_id:'',descricao:'',valor:'',vencimento:todayISO(),pago:true,...(row||{})}));
  const [busy,setBusy]=useState(false); const set=(k,v)=>setF(x=>({...x,[k]:v}));
  async function save(){ if(f.valor===''||isNaN(Number(f.valor))){toast('Informe o valor.','err');return;} setBusy(true);
    const payload={tenant_id:tenantId,tipo:f.tipo,categoria_id:f.categoria_id||null,descricao:f.descricao||null,valor:Number(f.valor)||0,
      vencimento:f.vencimento||null,pago:!!f.pago,pago_em:f.pago?(f.pago_em||todayISO()):null};
    const res=row?.id?await db.from('financeiro_lancamentos').update(payload).eq('id',row.id):await db.from('financeiro_lancamentos').insert(payload);
    setBusy(false); if(res.error){toast('Erro: '+res.error.message,'err');return;} toast('Lançamento salvo.','ok'); onSaved(); }
  const cats=categorias.filter(c=>c.tipo===f.tipo);
  return html`<${Modal} title=${row?.id?'Editar lançamento':'Novo lançamento'} onClose=${onClose} footer=${html`<${Fragment}>
    <button class="btn" onClick=${onClose}>Cancelar</button><button class="btn pri" disabled=${busy} onClick=${save}>${busy?'…':'Salvar'}</button></${Fragment}>`}>
    <div class="f2"><div><label>Tipo</label><select value=${f.tipo} onInput=${e=>set('tipo',e.target.value)}>
      <option value="receita">Receita (a receber)</option><option value="despesa">Despesa (a pagar)</option></select></div>
      <div><label>Categoria</label><select value=${f.categoria_id||''} onInput=${e=>set('categoria_id',e.target.value)}>
        <option value="">— Sem categoria —</option>${cats.map(c=>html`<option key=${c.id} value=${c.id}>${c.nome}</option>`)}</select></div></div>
    <label>Descrição</label><input value=${f.descricao||''} onInput=${e=>set('descricao',e.target.value)} placeholder="Ex.: Compra de linhas"/>
    <div class="f3"><div><label>Valor (R$)</label><input type="number" step="0.01" value=${f.valor} onInput=${e=>set('valor',e.target.value)}/></div>
      <div><label>Vencimento</label><input type="date" value=${f.vencimento||''} onInput=${e=>set('vencimento',e.target.value)}/></div>
      <div><label>Pago/Recebido</label><select value=${f.pago?'1':'0'} onInput=${e=>set('pago',e.target.value==='1')}><option value="1">Sim</option><option value="0">Não</option></select></div></div>
  </${Modal}>`;
}

  const catName=useMemo(()=>Object.fromEntries((categorias||[]).map(c=>[c.id,c.nome])),[categorias]);
  const ms=monthStart();
  const kpis=useMemo(()=>{ const r=rows||[]; const inMonth=x=>(x.pago_em||x.vencimento||'')>=ms;
    const rec=r.filter(l=>l.tipo==='receita'&&l.pago&&inMonth(l)).reduce((a,l)=>a+Number(l.valor||0),0);

    return {rec,desp,saldo:rec-desp,aReceber,aPagar}; },[rows]);
  const filtered=useMemo(()=>{ if(!rows) return null;
    return rows.filter(l=> filt==='todas'||(filt==='receita'&&l.tipo==='receita')||(filt==='despesa'&&l.tipo==='despesa')||(filt==='aberto'&&!l.pago)); },[rows,filt]);

      <div class="glass kpi" style=${{cursor:'default'}}><div class="n" style=${{fontSize:'1.5rem',color:kpis.saldo>=0?'var(--ok)':'var(--danger)'}}>${BRL(kpis.saldo)}</div><div class="l">Saldo do mês</div></div>
      <div class="glass kpi warn" style=${{cursor:'default'}}><div class="n" style=${{fontSize:'1.5rem'}}>${BRL(kpis.aReceber)}</div><div class="l">A receber (aberto)</div></div>
    </div>
    <div class="bar" style=${{marginTop:'18px'}}>

        <option value="todas">Todos</option><option value="receita">Receitas</option><option value="despesa">Despesas</option><option value="aberto">Em aberto</option></select>
      <div class="search"/>
      <button class="btn pri" onClick=${()=>setEdit({})}><${Ic} d=${I.plus}/>Novo lançamento</button>
    </div>
    <div class="glass panel">
      ${!filtered? html`<div class="hint">Carregando…</div>`

        : html`<div class="tblwrap"><table class="tbl"><thead><tr><th>Descrição</th><th>Categoria</th><th>Venc.</th><th>Situação</th><th class="r">Valor</th><th class="r">Ações</th></tr></thead>

/* ========== RELATÓRIOS ========== */
function Relatorios(){
  const {tenant}=useApp();
  const [data,setData]=useState(null);
  const [ini,setIni]=useState(monthStart()),[fim,setFim]=useState(todayISO());
  const load=useCallback(async()=>{
    setData(null);
    const [{data:os},{data:cli},{data:fin}]=await Promise.all([
      db.from('ordens').select('*'),
      db.from('clientes').select('id,nome'),
      db.from('financeiro_lancamentos').select('tipo,valor,pago,pago_em,descricao,vencimento'),
    ]);
    const cn=Object.fromEntries((cli||[]).map(c=>[c.id,c.nome]));
    const inRange=o=>o.data_entrada>=ini&&o.data_entrada<=fim;
    const per=(os||[]).filter(inRange);
    const receita=per.reduce((a,o)=>a+Number(o.valor||0),0);
    const porStatus=STATUS_ORDER.map(s=>[s,per.filter(o=>o.status===s).length]).filter(([,c])=>c>0);
    const topServ=Object.entries(per.reduce((m,o)=>{const k=(o.descricao||'Sem descrição').trim();m[k]=m[k]||{c:0,v:0};m[k].c++;m[k].v+=Number(o.valor||0);return m;},{})).sort((a,b)=>b[1].c-a[1].c).slice(0,8);
    const topCli=Object.entries((os||[]).reduce((m,o)=>{if(!o.cliente_id)return m;m[o.cliente_id]=(m[o.cliente_id]||0)+1;return m;},{})).map(([id,c])=>[cn[id]||'—',c]).sort((a,b)=>b[1]-a[1]).slice(0,8);
    const durs=per.filter(o=>o.entregue_em&&o.data_entrada).map(o=>daysBetween(o.data_entrada,o.entregue_em.slice(0,10))).filter(d=>d>=0);
    const tempoMedio=durs.length?(durs.reduce((a,b)=>a+b,0)/durs.length).toFixed(1):null;
    setData({qtd:per.length,receita,porStatus,topServ,topCli,tempoMedio,per,cn,fin:fin||[],ini,fim});
  },[ini,fim]);
  useEffect(()=>{load();},[]);
  const periodo = data? fmtDate(data.ini)+' a '+fmtDate(data.fim) : '';
  const printEntradas=()=>{ const rows=data.per.slice().sort((a,b)=>a.data_entrada.localeCompare(b.data_entrada));
    const tot=rows.reduce((s,o)=>s+Number(o.valor||0),0);
    const body='<div class="kv"><span>Período: <b>'+periodo+'</b></span><span>Serviços: <b>'+rows.length+'</b></span></div>'
      +'<table><thead><tr><th>#</th><th>Cliente</th><th>Serviço</th><th>Entrada</th><th class="r">Valor</th></tr></thead><tbody>'
      +rows.map(o=>'<tr><td>'+o.numero+'</td><td>'+esc(data.cn[o.cliente_id]||'—')+'</td><td>'+esc(o.descricao||'—')+'</td><td>'+fmtDate(o.data_entrada)+'</td><td class="r">'+BRL(o.valor)+'</td></tr>').join('')
      +'</tbody><tfoot><tr><td colspan="4">Total de entradas</td><td class="r">'+BRL(tot)+'</td></tr></tfoot></table>';
    printDoc('Relatório de Entradas — '+periodo, body, tenant?.nome); };
  const printFinalizados=()=>{ const rows=data.per.filter(o=>o.status==='finalizado'||o.status==='entregue').sort((a,b)=>(a.entregue_em||'').localeCompare(b.entregue_em||''));
    const tot=rows.reduce((s,o)=>s+Number(o.valor||0),0);
    const body='<div class="kv"><span>Período: <b>'+periodo+'</b></span><span>Finalizados: <b>'+rows.length+'</b></span><span>Tempo médio: <b>'+(data.tempoMedio??'—')+' dias</b></span></div>'
      +'<table><thead><tr><th>#</th><th>Cliente</th><th>Serviço</th><th>Entrega</th><th class="r">Valor</th></tr></thead><tbody>'
      +rows.map(o=>'<tr><td>'+o.numero+'</td><td>'+esc(data.cn[o.cliente_id]||'—')+'</td><td>'+esc(o.descricao||'—')+'</td><td>'+(o.entregue_em?fmtDate(o.entregue_em.slice(0,10)):'—')+'</td><td class="r">'+BRL(o.valor)+'</td></tr>').join('')
      +'</tbody><tfoot><tr><td colspan="4">Total finalizado</td><td class="r">'+BRL(tot)+'</td></tr></tfoot></table>';
    printDoc('Relatório de Finalizados — '+periodo, body, tenant?.nome); };
  const printFaturamento=()=>{ const inR=l=>{ const d=l.pago_em||l.vencimento||''; return d>=data.ini&&d<=data.fim; };
    const rec=data.fin.filter(l=>l.tipo==='receita'&&l.pago&&inR(l)); const desp=data.fin.filter(l=>l.tipo==='despesa'&&l.pago&&inR(l));
    const tr=rec.reduce((s,l)=>s+Number(l.valor||0),0), td=desp.reduce((s,l)=>s+Number(l.valor||0),0);
    const osTot=data.per.reduce((s,o)=>s+Number(o.valor||0),0);
    const body='<div class="kv"><span>Período: <b>'+periodo+'</b></span></div>'
      +'<table><tbody>'
      +'<tr><td>Serviços registrados no período</td><td class="r">'+BRL(osTot)+'</td></tr>'
      +'<tr><td>Receitas recebidas</td><td class="r">'+BRL(tr)+'</td></tr>'
      +'<tr><td>Despesas pagas</td><td class="r">− '+BRL(td)+'</td></tr>'
      +'</tbody><tfoot><tr><td>Saldo do período</td><td class="r">'+BRL(tr-td)+'</td></tr></tfoot></table>'
      +(rec.length?('<h3 style="margin-top:18px">Receitas recebidas</h3><table><thead><tr><th>Descrição</th><th>Data</th><th class="r">Valor</th></tr></thead><tbody>'+rec.map(l=>'<tr><td>'+esc(l.descricao||'—')+'</td><td>'+fmtDate(l.pago_em||l.vencimento)+'</td><td class="r">'+BRL(l.valor)+'</td></tr>').join('')+'</tbody></table>'):'');
    printDoc('Relatório de Faturamento — '+periodo, body, tenant?.nome); };
  return html`<${Shell} title="Relatórios">
    <div class="bar">
      <div><label style=${{margin:'0 0 4px'}}>De</label><input type="date" value=${ini} onInput=${e=>setIni(e.target.value)}/></div>
      <div><label style=${{margin:'0 0 4px'}}>Até</label><input type="date" value=${fim} onInput=${e=>setFim(e.target.value)}/></div>
      <div style=${{alignSelf:'flex-end'}}><button class="btn pri" onClick=${load}>Aplicar</button></div>
    </div>
    ${!data? html`<div class="hint">Calculando…</div>`: html`<${Fragment}>
      <div class="grid">
        <div class="glass kpi" style=${{cursor:'default'}}><div class="n">${data.qtd}</div><div class="l">Serviços no período</div></div>
        <div class="glass kpi ok" style=${{cursor:'default'}}><div class="n" style=${{fontSize:'1.5rem'}}>${BRL(data.receita)}</div><div class="l">Valor no período</div></div>
        <div class="glass kpi" style=${{cursor:'default'}}><div class="n">${data.tempoMedio??'—'}</div><div class="l">Tempo médio (dias)</div></div>
        <div class="glass kpi" style=${{cursor:'default'}}><div class="n">${data.qtd?BRL(data.receita/data.qtd):BRL(0)}</div><div class="l">Ticket médio</div></div>
      </div>
      <div class="glass panel" style=${{marginTop:'16px'}}>
        <h3>Gerenciador de relatórios</h3><p class="desc">Emita cada relatório individualmente — abre versão pronta para impressão / PDF.</p>
        <div style=${{display:'flex',gap:'10px',flexWrap:'wrap'}}>
          <button class="btn" onClick=${printEntradas}><${Ic} d=${I.print}/>Entradas do período</button>
          <button class="btn" onClick=${printFinalizados}><${Ic} d=${I.print}/>Finalizados</button>
          <button class="btn" onClick=${printFaturamento}><${Ic} d=${I.print}/>Faturamento</button>
        </div>
      </div>
      <div class="row two">
        <div class="glass panel"><h3>Serviços mais solicitados</h3><p class="desc">No período selecionado.</p>
          ${data.topServ.length? html`<div class="stat-list">${data.topServ.map(([s,o])=>html`<div class="it" key=${s}><span>${s}</span><span><span class="muted" style=${{marginRight:'10px'}}>${BRL(o.v)}</span><span class="v">${o.c}×</span></span></div>`)}</div>`:html`<div class="muted">Sem dados.</div>`}
        </div>
        <div class="glass panel"><h3>Clientes mais frequentes</h3><p class="desc">Total histórico de serviços.</p>
          ${data.topCli.length? html`<div class="stat-list">${data.topCli.map(([n,c])=>html`<div class="it" key=${n}><span>${n}</span><span class="v">${c}×</span></div>`)}</div>`:html`<div class="muted">Sem dados.</div>`}
        </div>
      </div>
      <div class="glass panel" style=${{marginTop:'16px'}}><h3>Distribuição por status</h3>
        ${data.porStatus.length? html`<div class="stat-list">${data.porStatus.map(([s,c])=>html`<div class="it" key=${s}><${Badge} status=${s}/><span class="v">${c}</span></div>`)}</div>`:html`<div class="muted">Sem dados.</div>`}
      </div>
    </${Fragment}>`}
  </${Shell}>`;
}

      número da nota para o seu controle.${f.iss_obs?html`<br/><span class="muted">${f.iss_obs}</span>`:''}
    </div>
    <div class="row two">
      <div class="glass panel"><h3>Identidade fiscal</h3><p class="desc">Dados usados na emissão da nota de serviço.</p>
        <div class="stat-list">
          <div class="it"><span>CNPJ</span><span class="v">${settings?.cnpj||'—'}</span></div>
          <div class="it"><span>Regime</span><span class="v">${f.regime||'MEI'}</span></div>

function EmitirNfse({ordem, portal, onClose, onDone}){
  const [num,setNum]=useState(''),[busy,setBusy]=useState(false);

    const {error}=await db.from('ordens').update({nfse_emitida:true, nfse_numero:num.trim(), nfse_emitida_em:new Date().toISOString()}).eq('id',ordem.id);
    setBusy(false);
    if(error){ toast('Erro ao registrar: '+error.message,'err'); return; }

      <div class="it"><span>Valor do serviço</span><span class="v">${BRL(ordem.valor)}</span></div>

/* ========== BILLING GATE (assinatura Stripe · reusa fin_assinaturas/criar-checkout) ========== */
function BillingGate({user}){
  const [st,setSt]=useState(null);
  const load=useCallback(async()=>{
    try{
      const pub=(typeof db.schema==='function')?db.schema('public'):db;
      const [perf,ass,cfg]=await Promise.all([
        pub.from('fin_perfis').select('is_admin').maybeSingle(),
        pub.from('fin_assinaturas').select('status,current_period_end').maybeSingle(),
        pub.from('config').select('valor').eq('chave','atelie_billing').maybeSingle(),
      ]);
      const admin=!!(perf.data&&perf.data.is_admin);
      const status=(ass.data&&ass.data.status)||'none';
      const active=status==='active'||status==='trialing';
      const pastDue=status==='past_due';
      const billing=(cfg.data&&cfg.data.valor)||{};
      const GRACE=Number(billing.grace_days!=null?billing.grace_days:45);
      const created=(user&&user.created_at)?new Date(user.created_at):null;
      const graceLeft=created?Math.ceil((created.getTime()+GRACE*86400000-Date.now())/86400000):null;
      const graceValid=GRACE>0&&graceLeft!=null&&graceLeft>0;
      setSt({admin,status,active,pastDue,graceLeft,graceValid,
        blocked:!admin&&!active&&!pastDue&&!graceValid,
        priceLabel:billing.preco_label||'Plano mensal', priceId:billing.stripe_price_id||null, coupon:billing.coupon||null});
    }catch(_){ setSt({admin:false,active:false,pastDue:false,graceValid:true,blocked:false}); } // falha aberta: nunca bloqueia
  },[user]);
  useEffect(()=>{ load(); },[user]);
  useEffect(()=>{
    const q=location.search||''; if(q.indexOf('assinatura=')<0) return;
    const ok=/assinatura=ok/.test(q);
    toast(ok?'Pagamento recebido! Ativando seu acesso…':'Checkout cancelado. Você pode assinar quando quiser.', ok?'ok':'');
    try{ history.replaceState(null,'',location.origin+location.pathname+location.hash); }catch(_){}
    if(ok){ [1500,4000,8000].forEach(ms=>setTimeout(load,ms)); }
  },[]);
  async function assinar(){
    const { data:{ session } }=await db.auth.getSession();
    if(!session){ toast('Sua sessão expirou. Entre novamente para assinar.','err'); return; }
    const back=location.origin+location.pathname;
    try{
      const r=await fetch(SUPABASE_URL+'/functions/v1/criar-checkout',{ method:'POST',
        headers:{ 'Content-Type':'application/json','apikey':SUPABASE_ANON,'Authorization':'Bearer '+session.access_token },
        body: JSON.stringify({ success_url:back+'?assinatura=ok', cancel_url:back+'?assinatura=cancelada', price_id:(st&&st.priceId)||undefined, coupon:(st&&st.coupon)||undefined }) });
      const j=await r.json().catch(()=>({}));
      if(j&&j.url) location.href=j.url; else toast('Não foi possível abrir o checkout'+(j&&j.error?': '+j.error:'.'),'err');
    }catch(_){ toast('Falha ao iniciar assinatura. Tente novamente.','err'); }
  }
  if(!st) return null;
  const showBanner=!st.admin&&!st.active&&(st.pastDue||(st.graceValid&&!st.blocked));
  const lock=html`<svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="10" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>`;
  return html`<${Fragment}>
    ${showBanner&&html`<div class=${'gate-bar '+(st.pastDue?'':'info')}>
      <span class="gd"></span>
      <span>${st.pastDue?'Pagamento pendente — regularize para manter o acesso.':'Ative sua assinatura para manter o acesso completo ao sistema.'}</span>
      <button class="gb" onClick=${assinar}>${st.pastDue?'Regularizar':'Assinar'}</button>
    </div>`}
    ${st.blocked&&html`<div class="gate-ov">
      <div class="gate-card">
        <div class="gate-ring">${lock}</div>
        <div class="gate-price">${st.priceLabel}</div>
        <h3>Assine para acessar</h3>
        <p>Seu acesso ao Ateliê Manager está pausado. Reative em segundos — seus dados continuam salvos e voltam exatamente como estavam.</p>
        <button class="gate-btn" onClick=${assinar}>Assinar agora</button>
        <button class="gate-exit" onClick=${()=>db.auth.signOut()}>Sair da conta</button>
      </div>
    </div>`}
  </${Fragment}>`;
}

/* ========== PRIMEIRO ACESSO (sugestão de trocar senha, 1x) ========== */
function FirstAccessModal({onClose}){
  const {profile}=useApp();
  const [s1,setS1]=useState(''),[s2,setS2]=useState(''),[show,setShow]=useState(false),[busy,setBusy]=useState(false);
  async function done(clearOnly){
    if(!clearOnly){
      if((s1||'').length<6){ toast('A senha deve ter ao menos 6 caracteres.','err'); return; }
      if(s1!==s2){ toast('As senhas não coincidem.','err'); return; }
      setBusy(true);
      const {error}=await db.auth.updateUser({password:s1});
      if(error){ setBusy(false); toast('Erro: '+error.message,'err'); return; }
    }
    try{ await db.from('profiles').update({trocar_senha:false}).eq('id',profile.id); }catch(_){}
    setBusy(false); if(!clearOnly) toast('Senha atualizada. Bem-vinda!','ok'); onClose();
  }
  return html`<${Modal} title="Bem-vinda ao seu sistema!" onClose=${()=>done(true)} footer=${html`<${Fragment}>
    <button class="btn" onClick=${()=>done(true)}>Fazer depois</button>
    <button class="btn pri" disabled=${busy} onClick=${()=>done(false)}>${busy?'Salvando…':'Salvar nova senha'}</button></${Fragment}>`}>
    <p style=${{marginTop:0,color:'#5a525c',fontSize:'.92rem'}}>Seu sistema está pronto e no seu nome. Para começar com segurança, crie uma <b>nova senha</b> — só sua.</p>
    <label>Nova senha</label>
    <div class="field"><input type=${show?'text':'password'} value=${s1} onInput=${e=>setS1(e.target.value)} placeholder="mín. 6 caracteres"/>
      <button type="button" class="toggle" onClick=${()=>setShow(v=>!v)}>${show?'ocultar':'mostrar'}</button></div>
    <label>Confirmar nova senha</label><input type=${show?'text':'password'} value=${s2} onInput=${e=>setS2(e.target.value)}/>
  </${Modal}>`;
}

/* ========== ATIVAÇÃO (primeiro acesso pós-pagamento) ========== */
function getQ(name){ try{ return new URLSearchParams(location.search).get(name); }catch(_){ return null; } }
function Ativar(){
  const token=getQ('a')||'';
  const [usuario,setUsuario]=useState(''),[s1,setS1]=useState(''),[s2,setS2]=useState('');
  const [show,setShow]=useState(false),[err,setErr]=useState(''),[busy,setBusy]=useState(false),[okMsg,setOkMsg]=useState('');
  async function submit(e){ e.preventDefault(); setErr('');
    if(!token){ setErr('Link de ativação inválido ou incompleto.'); return; }
    const u=usuario.trim();
    if(u.length<3){ setErr('Escolha um usuário com ao menos 3 caracteres.'); return; }
    if(!/^[a-zA-Z0-9._-]+$/.test(u)){ setErr('No usuário, use apenas letras, números, ponto, hífen ou sublinhado.'); return; }
    if(s1.length<6){ setErr('A senha deve ter ao menos 6 caracteres.'); return; }
    if(s1!==s2){ setErr('As senhas não coincidem.'); return; }
    setBusy(true);
    try{
      const r=await fetch(SUPABASE_URL+'/functions/v1/ativar-conta',{ method:'POST',
        headers:{ 'Content-Type':'application/json','apikey':SUPABASE_ANON,'Authorization':'Bearer '+SUPABASE_ANON },
        body: JSON.stringify({ token, username:u, senha:s1 }) });
      const j=await r.json().catch(()=>({}));
      if(!r.ok || !j.ok){ setBusy(false); setErr(j.error||'Não foi possível ativar sua conta.'); return; }
      setOkMsg('Conta criada! Entrando…');
      const { error }=await db.auth.signInWithPassword({ email:j.email, password:s1 });
      if(error){ setBusy(false); setErr('Conta criada. Use seu novo usuário e senha para entrar.'); setTimeout(()=>{ location.href=location.origin+location.pathname+'#/'; },1600); return; }
      try{ history.replaceState(null,'',location.origin+location.pathname+'#/'); }catch(_){}
      location.hash='/';
    }catch(_){ setBusy(false); setErr('Falha na ativação. Tente novamente.'); }
  }
  return html`<${Fragment}><${LivingBg}/><div class="center"><div class="glass card">
    <div style=${{display:'grid',placeItems:'center',marginBottom:'10px'}}><${BrandLogo} size=${110}/></div>
    <h1 class="title">Ative seu acesso</h1>
    <div class="sub">Crie seu usuário e senha para entrar no seu Ateliê Manager.</div>
    <form onSubmit=${submit}>
      ${err&&html`<div class="err">${err}</div>`}
      ${okMsg&&html`<div style=${{background:'rgba(63,125,82,.12)',color:'#3f7d52',padding:'8px 10px',borderRadius:'8px',fontSize:'.85rem',marginBottom:'8px'}}>${okMsg}</div>`}
      <label>Nome de usuário</label>
      <input type="text" autocapitalize="none" autocorrect="off" spellcheck="false" placeholder="ex.: costureirasalvador" value=${usuario} onInput=${e=>setUsuario(e.target.value)} required/>
      <label>Senha</label>
      <div class="field"><input type=${show?'text':'password'} placeholder="mín. 6 caracteres" value=${s1} onInput=${e=>setS1(e.target.value)} required/>
        <button type="button" class="toggle" onClick=${()=>setShow(v=>!v)}>${show?'ocultar':'mostrar'}</button></div>
      <label>Confirmar senha</label>
      <input type=${show?'text':'password'} value=${s2} onInput=${e=>setS2(e.target.value)} required/>
      <button class="primary" disabled=${busy}>${busy?'Ativando…':'Ativar e entrar'}</button>
    </form>
    <div class="foot"><${ByVizio} dark=${true}/></div>
  </div></div></${Fragment}>`;
}

/* ========== MASTER · gerar link de ativação (admin) ========== */
function Master(){
  const {isAdmin}=useApp();
  const [email,setEmail]=useState(''),[nome,setNome]=useState(''),[dias,setDias]=useState('7');
  const [link,setLink]=useState(''),[err,setErr]=useState(''),[busy,setBusy]=useState(false);
  async function gerar(e){ e.preventDefault(); setErr(''); setLink('');
    const em=email.trim();
    if(!/^[^@\s]+@[^@\s]+\.[^@\s]+$/.test(em)){ setErr('Informe um e-mail válido.'); return; }
    const { data:{ session } }=await db.auth.getSession();
    if(!session){ setErr('Sessão expirada. Entre novamente.'); return; }
    setBusy(true);
    try{
      const r=await fetch(SUPABASE_URL+'/functions/v1/gerar-ativacao',{ method:'POST',
        headers:{ 'Content-Type':'application/json','apikey':SUPABASE_ANON,'Authorization':'Bearer '+session.access_token },
        body: JSON.stringify({ email:em, nome:nome.trim()||undefined, dias:Number(dias)||7,
          instancia:nome.trim()?('Ateliê Manager — '+nome.trim()):undefined }) });
      const j=await r.json().catch(()=>({}));
      setBusy(false);
      if(!r.ok || !j.url){ setErr(j.error||'Não foi possível gerar o link.'); return; }
      setLink(j.url);
    }catch(_){ setBusy(false); setErr('Falha ao gerar o link. Tente novamente.'); }
  }
  function copiar(){ try{ navigator.clipboard.writeText(link); toast('Link copiado!','ok'); }catch(_){ toast('Copie manualmente o link.','err'); } }
  return html`<${Shell}>
    <div style=${{marginBottom:'14px'}}><h1 class="h1">Ativação de cliente</h1>
      <p class="muted">Gere o link de primeiro acesso <b>depois</b> de confirmar o pagamento. O link cria a conta já ativa; a cliente define usuário e senha.</p></div>
    ${!isAdmin?html`<div class="glass card"><h3>Acesso restrito</h3><p class="muted">Esta área é exclusiva do administrador da plataforma.</p></div>`
    :html`<div class="glass card" style=${{maxWidth:'560px'}}>
      <form onSubmit=${gerar}>
        ${err&&html`<div class="err">${err}</div>`}
        <label>E-mail da cliente (o mesmo do pagamento)</label>
        <input type="email" autocapitalize="none" autocorrect="off" spellcheck="false" value=${email} onInput=${e=>setEmail(e.target.value)} placeholder="cliente@email.com" required/>
        <label>Nome (opcional)</label>
        <input type="text" value=${nome} onInput=${e=>setNome(e.target.value)} placeholder="Aimée"/>
        <label>Validade do link (dias)</label>
        <input type="number" min="1" max="30" value=${dias} onInput=${e=>setDias(e.target.value)}/>
        <button class="primary" disabled=${busy}>${busy?'Gerando…':'Gerar link de ativação'}</button>
      </form>
      ${link&&html`<div style=${{marginTop:'16px'}}>
        <label>Link para enviar à cliente</label>
        <div class="field"><input type="text" readOnly value=${link} onFocus=${e=>e.target.select()}/>
          <button type="button" class="toggle" onClick=${copiar}>copiar</button></div>
        <p class="muted" style=${{fontSize:'.8rem'}}>Envie por WhatsApp ou e-mail. Ao abrir, ela cria usuário e senha e entra já com acesso liberado.</p>
      </div>`}
    </div>`}
  </${Shell}>`;
}

/* ========== ROOT ========== */
function App(){
  const [session,setSession]=useState(undefined);
  const [ctx,setCtx]=useState(null);
  const [firstDone,setFirstDone]=useState(false);
  useEffect(()=>{
    db.auth.getSession().then(({data})=>setSession(data.session));
    const { data:sub }=db.auth.onAuthStateChange((_e,s)=>setSession(s));
    return ()=>sub.subscription.unsubscribe();
  },[]);
  useEffect(()=>{ if(!session){ setCtx(null); return; } (async()=>{
    const [{data:m},{data:prof},adm]=await Promise.all([
      db.from('tenant_memberships').select('tenant_id,role').eq('user_id',session.user.id).eq('ativo',true).limit(1).maybeSingle(),
      db.from('profiles').select('*').eq('id',session.user.id).maybeSingle(),
      (typeof db.schema==='function'?db.schema('public'):db).from('fin_perfis').select('is_admin').maybeSingle(),
    ]);
    let tenant=null, settings={};
    if(m?.tenant_id){ const {data:t}=await db.from('tenants').select('*').eq('id',m.tenant_id).maybeSingle(); tenant=t;
      const {data:st}=await db.from('tenant_settings').select('cor_primaria,cor_secundaria,cnpj,endereco,telefone,whatsapp,email,subtitulo,fiscal').eq('tenant_id',m.tenant_id).maybeSingle();
      settings=st||{};
      if(st?.cor_primaria) document.documentElement.style.setProperty('--plum',st.cor_primaria);
      if(st?.cor_secundaria) document.documentElement.style.setProperty('--violet',st.cor_secundaria);
    }
    setCtx({ tenant, tenantId:m?.tenant_id, settings, role:m?.role||'atendente', isAdmin:!!(adm&&adm.data&&adm.data.is_admin), trocarSenha:!!(prof&&prof.trocar_senha), profile:prof||{nome:(session.user.email||'').split('@')[0]} });
  })(); },[session]);
  const onAtivar=(location.hash||'').replace(/^#\/?/,'').split('?')[0].split('/')[0]==='ativar';
  if(onAtivar) return html`<${Fragment}><${Toaster}/><${Ativar}/></${Fragment}>`;
  if(session===undefined) return html`<${Fragment}><${Toaster}/><div class="center"><div class="sub">Carregando…</div></div></${Fragment}>`;
  if(!session) return html`<${Fragment}><${Toaster}/><${Login}/></${Fragment}>`;
  if(!ctx) return html`<${Fragment}><${Toaster}/><div class="center"><div class="sub">Preparando seu ateliê…</div></div></${Fragment}>`;
  return html`<${Ctx.Provider} value=${ctx}><${Toaster}/><${BillingGate} user=${session.user}/>${ctx.trocarSenha&&!firstDone&&html`<${FirstAccessModal} onClose=${()=>setFirstDone(true)}/>`}<${Router}/></${Ctx.Provider}>`;
}
ReactDOM.createRoot(document.getElementById('root')).render(createElement(App));
</script>
</body>
