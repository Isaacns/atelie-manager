<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<!-- Evita que o navegador sirva uma versão antiga do app (ver VersionGate). -->
<meta http-equiv="Cache-Control" content="no-cache, must-revalidate" />
<meta http-equiv="Pragma" content="no-cache" />
<title>Ateliê Manager — Costureira Salvador</title>
<!-- Ícone da aba (favicon) + atalho de celular. Hoje aponta para a logo do tenant
     (mesma imagem usada na sidebar). White-label: quando a logo passar a vir das
     configurações do tenant, este href deve acompanhar (setar via JS ao carregar). -->
<link rel="icon" type="image/jpeg" href="costureira-logo.jpg" />
<link rel="apple-touch-icon" href="costureira-logo.jpg" />
<meta name="theme-color" content="#5e3a56" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,500;0,600;0,700;1,500&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#f4efe8; --card:#fbf8f3; --ink:#2e2b31; --fg:#2e2b31; --muted:#8a7e86;
    --plum:#5e3a56; --plum-2:#4c2e46; --violet:#8e2cb0; --charcoal:#2e2b31;
    --gold:#c8a96a; --border:#e7ddd0; --danger:#b3452f; --ok:#3f7d52; --warn:#b98325;
    --radius:1rem; --shadow:0 8px 32px rgba(70,40,80,.10);
  }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%;overflow-x:hidden;max-width:100%}
  body{
    font-family:Inter,system-ui,sans-serif;color:var(--fg);background:var(--bg);
    background-image:
      radial-gradient(60rem 60rem at 110% -10%, rgba(142,44,176,.10), transparent 60%),
      radial-gradient(50rem 50rem at -10% 10%, rgba(200,169,106,.16), transparent 55%);
    background-attachment:fixed;-webkit-font-smoothing:antialiased;
  }
  .serif{font-family:"Cormorant Garamond",Georgia,serif}
  a{color:inherit}
  .center{min-height:100dvh;display:grid;place-items:center;padding:24px}
  .glass{background:rgba(251,248,243,.72);backdrop-filter:blur(18px);
    border:1px solid rgba(255,255,255,.5);box-shadow:var(--shadow);border-radius:1.25rem}
  /* logo */
  .mark{width:44px;height:28px;color:var(--charcoal)}
  @media (prefers-reduced-motion:no-preference){.breathe{animation:br 4.5s ease-in-out infinite;transform-origin:center}}
  @keyframes br{0%,100%{transform:scale(1);opacity:1}50%{transform:scale(1.045);opacity:.92}}
  .logo-badge{width:96px;height:96px;border-radius:999px;background:
    radial-gradient(120% 120% at 30% 20%, #3a363f, #2b282e 70%);
    display:grid;place-items:center;box-shadow:0 10px 30px rgba(46,43,49,.35);margin:0 auto}
  .logo-badge .mark{width:60px;height:38px;color:#fff}
  /* login */
  .card{width:100%;max-width:420px;padding:32px}
  h1.title{font-family:"Cormorant Garamond",serif;font-size:2rem;margin:.4rem 0 .1rem;text-align:center}
  .sub{color:var(--muted);text-align:center;font-size:.9rem;margin-bottom:20px}
  label{display:block;font-size:.82rem;font-weight:600;margin:14px 0 6px;color:#5a525c}
  .field{position:relative}
  input,select,textarea{width:100%;height:44px;border:1px solid var(--border);background:rgba(255,255,255,.75);
    border-radius:.6rem;padding:0 14px;font-size:.95rem;color:var(--fg);outline:none;font-family:inherit}
  textarea{height:auto;padding:10px 14px;resize:vertical;min-height:72px}
  input:focus,select:focus,textarea:focus{border-color:var(--plum);box-shadow:0 0 0 3px rgba(94,58,86,.15)}
  .toggle{position:absolute;right:6px;top:6px;height:32px;width:auto;padding:0 10px;border:0;background:transparent;
    color:var(--muted);cursor:pointer;font-size:.78rem}
  button.primary{width:100%;height:46px;margin-top:8px;border:0;border-radius:.6rem;
    background:var(--plum);color:#fff;font-weight:600;font-size:.95rem;cursor:pointer;transition:.15s}
  button.primary:hover{background:var(--plum-2)}
  button.primary:disabled{opacity:.6;cursor:default}
  .err{background:rgba(179,69,47,.1);border:1px solid rgba(179,69,47,.3);color:var(--danger);
    border-radius:.5rem;padding:10px 12px;font-size:.85rem;margin-bottom:8px}
  .foot{color:var(--muted);text-align:center;font-size:.72rem;margin-top:18px;letter-spacing:.02em}
  /* app shell */
  .app{display:grid;grid-template-columns:236px 1fr;min-height:100dvh}
  .side{position:sticky;top:0;z-index:20;height:100dvh;padding:20px 14px;border-right:1px solid var(--border);
    background:rgba(248,244,238,.75);backdrop-filter:blur(16px);display:flex;flex-direction:column;gap:4px}
  .side .brand{display:flex;align-items:center;gap:10px;padding:6px 8px 16px}
  .side .brand .nm{font-family:"Cormorant Garamond",serif;font-size:1.15rem;line-height:1;font-weight:600}
  .side .brand .tg{font-size:.6rem;letter-spacing:.16em;text-transform:uppercase;color:var(--muted)}
  /* O menu rola; o rodapé (usuária + Sair) fica ancorado embaixo, sempre visível.
     Antes o .side tinha altura fixa sem rolagem: ao crescer o menu, o Sair caiu para fora da tela.
     min-height:0 é obrigatório — sem ele o item flex não encolhe e a rolagem não acontece. */
  .nav{display:flex;flex-direction:column;gap:2px;flex:1 1 auto;min-height:0;overflow-y:auto;
    scrollbar-width:none;-ms-overflow-style:none}
  .nav::-webkit-scrollbar{width:0;height:0}   /* §2: barra de rolagem invisível */
  .nav a{position:relative;display:flex;align-items:center;gap:11px;padding:10px 12px;border-radius:.6rem;
    font-size:.9rem;font-weight:500;color:#5a525c;text-decoration:none;cursor:pointer;transition:.12s}
  .nav a:hover{background:rgba(142,44,176,.07);color:var(--plum)}
  .nav a.on{background:var(--plum);color:#fff}
  .nav a.on svg{color:#fff}
  .nav a svg{width:18px;height:18px;color:var(--muted);flex:0 0 auto}
  .nav a:hover svg{color:var(--plum)}
  .nav .sep{font-size:.62rem;letter-spacing:.14em;text-transform:uppercase;color:#b6a9b1;padding:14px 12px 4px}
  .side .who{flex:0 0 auto;margin-top:8px;padding-top:12px;border-top:1px solid var(--border);font-size:.78rem;color:var(--muted)}
  .side .who b{color:var(--fg);display:block;font-size:.85rem}
  .side .who button{margin-top:8px;width:100%;height:34px;border:1px solid var(--border);background:rgba(255,255,255,.6);
    border-radius:.5rem;cursor:pointer;color:var(--fg);font-size:.82rem}
  .side .who button:hover{border-color:var(--plum);color:var(--plum)}
  /* content */
  .main{min-width:0}
  .topbar{position:sticky;top:0;z-index:4;display:flex;align-items:center;gap:12px;height:62px;padding:0 24px;
    background:rgba(244,239,232,.8);backdrop-filter:blur(16px);border-bottom:1px solid var(--border)}
  .topbar h2{font-family:"Cormorant Garamond",serif;font-size:1.5rem;margin:0;font-weight:600}
  .topbar .plan{margin-left:6px;font-size:.68rem;padding:3px 9px;border-radius:999px;background:rgba(142,44,176,.1);color:var(--violet);font-weight:600}
  .topbar .spacer{margin-left:auto}
  .wrap{max-width:1120px;margin:0 auto;padding:26px 24px 60px}
  .hi{font-family:"Cormorant Garamond",serif;font-size:2rem;margin:0}
  .hint{color:var(--muted);font-size:.92rem;margin:2px 0 20px}
  /* kpis */
  .grid{display:grid;grid-template-columns:repeat(2,1fr);gap:14px}
  @media(min-width:820px){.grid{grid-template-columns:repeat(4,1fr)}}
  .kpi{padding:18px 20px;border-radius:1.1rem;text-align:left;cursor:pointer;border:0;background:rgba(251,248,243,.72);
    backdrop-filter:blur(18px);box-shadow:var(--shadow);transition:.15s;font-family:inherit}
  .kpi:hover{transform:translateY(-2px);box-shadow:0 14px 38px rgba(70,40,80,.14)}
  .kpi .n{font-family:"Cormorant Garamond",serif;font-size:2.1rem;line-height:1;color:var(--plum)}
  .kpi .l{color:var(--muted);font-size:.82rem;margin-top:6px}
  .kpi.warn .n{color:var(--warn)} .kpi.ok .n{color:var(--ok)}
  /* cards / sections */
  .row{display:grid;gap:16px;margin-top:18px}
  @media(min-width:820px){.row.two{grid-template-columns:1fr 1fr}.row.side{grid-template-columns:1.6fr 1fr}}
  .panel{padding:20px;border-radius:1.1rem}
  .panel h3{margin:0 0 2px;font-size:1rem;font-weight:600}
  .panel .desc{color:var(--muted);font-size:.82rem;margin:0 0 14px}
  /* toolbar */
  .bar{display:flex;gap:10px;align-items:center;flex-wrap:wrap;margin-bottom:16px}
  .bar .search{flex:1;min-width:200px}
  .bar input,.bar select{height:42px}
  .btn{height:42px;padding:0 16px;border-radius:.6rem;border:1px solid var(--border);background:rgba(255,255,255,.65);
    color:var(--fg);font-weight:600;font-size:.88rem;cursor:pointer;display:inline-flex;align-items:center;gap:7px;font-family:inherit;white-space:nowrap}
  .btn:hover{border-color:var(--plum);color:var(--plum)}
  .btn.pri{background:var(--plum);border-color:var(--plum);color:#fff}
  .btn.pri:hover{background:var(--plum-2)}
  .btn.sm{height:34px;padding:0 12px;font-size:.82rem}
  .btn.ghost{background:transparent;border-color:transparent}
  /* §12 dos Padrões INPERSON/VIZIO — botão de WhatsApp é sempre verde, em todo sistema */
  .btn.wa{background:linear-gradient(180deg,#25D366,#12A150);border-color:#12A150;color:#fff}
  .btn.wa:hover{background:linear-gradient(180deg,#20bd5c,#0f8e46)}
  .btn svg{width:16px;height:16px}
  .link{background:none;border:0;color:var(--plum);cursor:pointer;font-weight:600;font-size:.85rem;padding:0;font-family:inherit;text-decoration:underline;text-underline-offset:2px}
  /* table */
  .tbl{width:100%;border-collapse:collapse;font-size:.88rem}
  .tbl th{text-align:left;font-weight:600;color:var(--muted);font-size:.74rem;text-transform:uppercase;letter-spacing:.04em;
    padding:0 12px 10px;border-bottom:1px solid var(--border)}
  .tbl td{padding:12px;border-bottom:1px solid rgba(231,221,208,.6);vertical-align:middle}
  .tbl tr:last-child td{border-bottom:0}
  .tbl tr.click{cursor:pointer}
  .tbl tr.click:hover td{background:rgba(142,44,176,.05)}
  .tbl .r{text-align:right}
  .tbl .low td{background:rgba(185,131,37,.07)}
  .tblwrap{overflow-x:auto}
  /* badge */
  .badge{display:inline-flex;align-items:center;gap:6px;font-size:.74rem;font-weight:600;padding:4px 10px;border-radius:999px;white-space:nowrap}
  .dot{width:7px;height:7px;border-radius:999px;background:currentColor;opacity:.9}
  /* modal */
  .ov{position:fixed;inset:0;background:rgba(46,43,49,.42);backdrop-filter:blur(3px);display:grid;place-items:center;padding:20px;z-index:20}
  .modal{width:100%;max-width:560px;max-height:90dvh;overflow:auto;background:var(--card);border-radius:1.1rem;
    box-shadow:0 24px 70px rgba(46,43,49,.3);border:1px solid rgba(255,255,255,.6)}
  .modal .mh{position:sticky;top:0;background:var(--card);display:flex;align-items:center;justify-content:space-between;
    padding:20px 22px 12px;border-bottom:1px solid var(--border)}
  .modal .mh h3{margin:0;font-family:"Cormorant Garamond",serif;font-size:1.35rem;font-weight:600}
  .modal .mb{padding:18px 22px}
  .modal .mf{position:sticky;bottom:0;background:var(--card);display:flex;gap:10px;justify-content:flex-end;padding:14px 22px;border-top:1px solid var(--border)}
  .x{border:0;background:transparent;font-size:1.3rem;color:var(--muted);cursor:pointer;line-height:1}
  .f2{display:grid;grid-template-columns:1fr 1fr;gap:0 14px}
  .f3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:0 14px}
  @media(max-width:560px){.f2,.f3{grid-template-columns:1fr}}
  .ferr{color:var(--danger);font-size:.78rem;margin-top:4px}
  /* empty */
  .empty{text-align:center;padding:44px 20px;color:var(--muted)}
  .empty .em{width:44px;height:44px;margin:0 auto 10px;color:#c9bcc3}
  .empty h4{margin:0 0 4px;color:var(--fg);font-weight:600}
  /* toast */
  .toasts{position:fixed;right:18px;bottom:18px;display:flex;flex-direction:column;gap:8px;z-index:40}
  .toast{background:var(--ink);color:#fff;padding:12px 16px;border-radius:.6rem;font-size:.86rem;box-shadow:0 10px 30px rgba(0,0,0,.25);max-width:320px}
  .toast.ok{background:var(--ok)} .toast.err{background:var(--danger)}
  /* misc */
  .stat-list{display:flex;flex-direction:column;gap:2px}
  .stat-list .it{display:flex;align-items:center;justify-content:space-between;padding:9px 4px;border-bottom:1px solid rgba(231,221,208,.6);font-size:.88rem}
  .stat-list .it:last-child{border-bottom:0}
  .stat-list .it .v{font-weight:600;color:var(--plum)}
  .muted{color:var(--muted)} .b{font-weight:600}
  .tag{display:inline-block;font-size:.72rem;padding:3px 8px;border-radius:.4rem;background:rgba(94,58,86,.08);color:var(--plum);font-weight:600}
  .notice{background:rgba(142,44,176,.06);border:1px solid rgba(142,44,176,.18);border-radius:.7rem;padding:14px 16px;font-size:.85rem;color:#5a525c}
  .notice b{color:var(--plum)}
  .chk{display:flex;gap:9px;align-items:flex-start;padding:7px 0;font-size:.88rem}
  .chk .m{width:18px;height:18px;flex:0 0 auto;color:var(--muted)}
  /* living background — padrão VIZIO (adaptado à paleta Costureira) */
  .living{position:fixed;inset:0;z-index:0;overflow:hidden;pointer-events:none}
  .living .orb{position:absolute;border-radius:50%;filter:blur(64px)}
  .living .orb.a{width:540px;height:540px;left:-150px;top:-110px;background:radial-gradient(circle,rgba(142,44,176,.72),transparent 66%)}
  .living .orb.b{width:470px;height:470px;right:-130px;top:22%;background:radial-gradient(circle,rgba(142,44,176,.56),transparent 68%)}
  .living .orb.c{width:620px;height:620px;left:22%;bottom:-250px;background:radial-gradient(circle,rgba(142,44,176,.64),transparent 68%)}
  @media (prefers-reduced-motion:no-preference){
    .living .orb.a{animation:orbB 8s ease-in-out infinite}
    .living .orb.b{animation:orbB 8s ease-in-out infinite -2.5s}
    .living .orb.c{animation:orbB 8s ease-in-out infinite -5s}
    @keyframes orbB{0%,100%{transform:scale(1) translate(0,0);opacity:.58}50%{transform:scale(1.17) translate(14px,-20px);opacity:.82}}
  }
  .center,.app{position:relative;z-index:1}
  .app{background:transparent}
  /* brand logos */
  .brandmark{border-radius:50%;object-fit:cover;display:block;box-shadow:0 0 0 2px var(--cream),0 0 0 4px rgba(142,44,176,.5),0 8px 22px rgba(46,43,49,.28)}
  .story-ring{display:inline-grid;place-items:center;border-radius:50%;padding:3px;background:conic-gradient(from 210deg,#8e2cb0,#c86ee0 25%,#8e2cb0 55%,#5e3a56 80%,#8e2cb0);box-shadow:0 6px 18px rgba(142,44,176,.28)}
  .story-ring .brandmark{box-shadow:none;border:2.5px solid var(--cream)}
  @media (prefers-reduced-motion:no-preference){.breathe-img{animation:imgBr 4.6s ease-in-out infinite;transform-origin:center}}
  @keyframes imgBr{0%,100%{transform:scale(1)}50%{transform:scale(1.055)}}
  .byvizio{display:inline-flex;align-items:center;gap:6px;color:var(--muted);font-size:.72rem}
  .byvizio img{height:15px;width:auto}
  .byvizio b{font-weight:600}
  @media (prefers-reduced-motion:no-preference){.vzfloat{animation:vzF 5s ease-in-out infinite}}
  @keyframes vzF{0%,100%{transform:translateY(0)}50%{transform:translateY(-2.5px)}}
  /* chart */
  .chartbox{height:158px;position:relative}
  /* measures + segments */
  .measure-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:0 12px}
  @media(max-width:560px){.measure-grid{grid-template-columns:1fr 1fr}}
  .seg{display:inline-flex;gap:6px;flex-wrap:wrap}
  .chip{border:1px solid var(--border);background:rgba(255,255,255,.6);border-radius:999px;padding:7px 13px;font-size:.82rem;cursor:pointer;font-family:inherit;color:var(--fg);font-weight:500}
  .chip.on{background:var(--plum);border-color:var(--plum);color:#fff}
  /* alerts balloon */
  .bell-badge{position:absolute;top:-5px;right:-5px;background:var(--danger);color:#fff;font-size:.62rem;font-weight:700;min-width:16px;height:16px;border-radius:999px;display:grid;place-items:center;padding:0 3px}
  .pop{position:absolute;right:0;top:46px;width:310px;max-height:66vh;overflow:auto;background:var(--card);border:1px solid var(--border);border-radius:.8rem;box-shadow:0 18px 50px rgba(46,43,49,.25);z-index:30}
  .pop-h{padding:12px 14px;font-weight:600;border-bottom:1px solid var(--border)}
  .pop-empty{padding:22px 14px;color:var(--muted);font-size:.86rem;text-align:center}
  .pop-it{display:flex;gap:10px;align-items:flex-start;width:100%;text-align:left;padding:11px 14px;border:0;border-bottom:1px solid rgba(231,221,208,.6);background:transparent;cursor:pointer;font-family:inherit;font-size:.83rem;line-height:1.35}
  .pop-it:last-child{border-bottom:0} .pop-it:hover{background:rgba(142,44,176,.05)}
  .pi-ic{width:26px;height:26px;border-radius:7px;display:grid;place-items:center;flex:0 0 auto}
  .pi-ic svg{width:15px;height:15px} .pi-ic.warn{background:rgba(185,131,37,.15);color:var(--warn)} .pi-ic.low{background:rgba(142,44,176,.12);color:var(--violet)}
  /* billing gate */
  .gate-bar{position:sticky;top:0;z-index:8;display:flex;gap:12px;align-items:center;justify-content:center;flex-wrap:wrap;padding:10px 16px;font-size:.85rem;font-weight:600;color:#5a3d16;background:linear-gradient(90deg,#fbf1dc,#fce9c0,#fbf1dc);border-bottom:1px solid #f0d69a}
  .gate-bar.info{color:#4c2e46;background:linear-gradient(90deg,#f2e9f4,#ecdcf0,#f2e9f4);border-bottom:1px solid rgba(142,44,176,.25)}
  .gate-bar .gd{width:8px;height:8px;border-radius:50%;background:#b98325}
  .gate-bar.info .gd{background:var(--violet)}
  .gate-bar .gb{cursor:pointer;border:0;background:var(--ink);color:#fff;font-weight:700;font-size:.8rem;padding:6px 14px;border-radius:8px;font-family:inherit}
  .gate-bar.info .gb{background:var(--plum)}
  .gate-ov{position:fixed;inset:0;z-index:9000;display:grid;place-items:center;padding:24px;background:radial-gradient(120% 120% at 50% -10%,rgba(142,44,176,.24),rgba(46,43,49,.6) 60%);backdrop-filter:blur(7px)}
  .gate-card{position:relative;max-width:430px;width:100%;background:var(--card);border-radius:20px;padding:34px 30px 26px;text-align:center;border:1px solid rgba(255,255,255,.6);box-shadow:0 24px 70px rgba(46,43,49,.35)}
  .gate-ring{width:60px;height:60px;margin:0 auto 14px;border-radius:50%;display:grid;place-items:center;background:linear-gradient(135deg,var(--violet),var(--plum))}
  .gate-ring svg{width:26px;height:26px}
  .gate-price{font-size:.74rem;font-weight:700;letter-spacing:.04em;text-transform:uppercase;color:var(--violet);margin-bottom:10px}
  .gate-card h3{margin:0 0 6px;font-family:"Cormorant Garamond",serif;font-size:1.5rem;font-weight:600;color:var(--ink)}
  .gate-card p{margin:0 auto 18px;font-size:.9rem;color:#5f5760;max-width:330px}
  .gate-btn{border:0;cursor:pointer;background:var(--plum);color:#fff;font-weight:700;font-size:.96rem;padding:13px 26px;border-radius:11px;font-family:inherit;box-shadow:0 10px 26px rgba(94,58,86,.34)}
  .gate-btn:hover{background:var(--plum-2)}
  .gate-exit{display:block;margin:14px auto 0;background:0;border:0;font-size:.78rem;color:var(--muted);cursor:pointer;font-family:inherit}
  /* mobile nav */
  .menu-btn{display:none}
  @media(max-width:820px){
    .app{grid-template-columns:1fr}
    .side{position:fixed;left:0;top:0;height:100dvh;overflow:auto;z-index:30;width:264px;transform:translateX(-100%);transition:.2s}
    .side.open{transform:none}
    .menu-btn{display:inline-flex}
    .backdrop{position:fixed;inset:0;background:rgba(46,43,49,.4);z-index:25}
    .wrap{padding:20px 14px 64px}
    .topbar{padding:0 12px;gap:8px}
    .topbar h2{font-size:1.2rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;min-width:0}
    .row.side,.row.two{grid-template-columns:1fr}
  }
  @media(max-width:560px){
    .grid{gap:10px}
    .kpi{padding:14px 15px}
    .kpi .n{font-size:1.7rem}
    .hi{font-size:1.55rem}
    .panel{padding:16px}
    .glass.kpi .n[style]{font-size:1.25rem!important}
    .tbl{font-size:.82rem}
    .tbl th,.tbl td{padding:9px 7px}
    .modal .mh,.modal .mf{padding-left:16px;padding-right:16px}
    .modal .mb{padding:16px}
    .bar{gap:8px}
    .bar .btn.pri{flex:1;justify-content:center}
    .measure-grid{grid-template-columns:1fr 1fr}
    .topbar h2{font-size:1.05rem}
  }

  /* ===== §8.1 — identificação do usuário no canto superior direito ===== */

function resizeImage(file, max=1600, quality=0.82){
  return new Promise((resolve,reject)=>{
    const url=URL.createObjectURL(file); const img=new Image();
    img.onload=()=>{ URL.revokeObjectURL(url);
      let w=img.width,h=img.height; if(w>max||h>max){ if(w>=h){ h=Math.round(h*max/w); w=max; } else { w=Math.round(w*max/h); h=max; } }
      const c=document.createElement('canvas'); c.width=w; c.height=h; c.getContext('2d').drawImage(img,0,0,w,h);
      c.toBlob(b=> b?resolve(b):reject(new Error('Falha ao processar a imagem')), 'image/jpeg', quality); };

let pushToast=()=>{};
function Toaster(){
  const [ts,setTs]=useState([]);
  useEffect(()=>{ pushToast=(msg,kind='')=>{ const id=Math.random(); setTs(x=>[...x,{id,msg,kind}]); setTimeout(()=>setTs(x=>x.filter(t=>t.id!==id)),3400); }; },[]);
  return html`<div class="toasts">${ts.map(t=>html`<div key=${t.id} class=${'toast '+t.kind}>${t.msg}</div>`)}</div>`;
}

/* ========== TRATAMENTO PADRÃO DE ERRO EM LEITURA ==========
   Toda consulta avulsa passa por aqui. Erro nunca é silencioso: avisa a usuária,
   registra no console e devolve null (distinto de [] = "consultou e não achou nada").
   Foi exatamente o padrão `data||[]` sem checar `error` que escondeu o bug crítico da v1.12. */
function qd(res, contexto){
  if(!res) return null;
  if(res.error){
    console.error('[consulta: '+contexto+']', res.error);
    toast('Não foi possível carregar '+contexto+'. '+(res.error.message||''),'err');
    return null;
  }
  return res.data;
}
/* Rede de segurança: registra falhas não tratadas no console (sem alarmar a usuária
   com falsos positivos de fetch abortado, gráficos, etc.). Serve para diagnóstico. */
if(typeof window!=='undefined' && !window.__vzErrHook){
  window.__vzErrHook=true;
  window.addEventListener('unhandledrejection', ev=>console.error('[falha não tratada]', ev && ev.reason));
}

/* ========== DETECÇÃO DE VERSÃO NOVA ==========
   A cliente deixa a aba aberta por horas: sem isto, ela continua rodando código antigo
   mesmo depois do deploy (foi a causa do erro de "subtotal" persistir após a correção).
   Compara o APP_VERSION publicado com o que está rodando e oferece atualizar. */
function VersionGate(){
  const [nova,setNova]=useState(null);
  useEffect(()=>{
    let vivo=true, checando=false;
    // Não bloquear por document.hidden: uma aba aberta em segundo plano é justamente
    // o caso que precisamos pegar (foi assim que a cliente ficou presa na versão antiga).
    async function checar(){
      if(checando||!vivo) return; checando=true;
      try{
        const base=location.href.replace(/[#?].*$/,'');
        const r=await fetch(base+'index.html?_v='+Date.now(),{cache:'no-store'});
        if(r.ok){ const t=await r.text(); const m=t.match(/APP_VERSION\s*=\s*'([^']+)'/);
          if(vivo && m && m[1] && m[1]!==APP_VERSION) setNova(m[1]); }
      }catch(_){ /* offline: silencioso, tenta de novo depois */ }
      checando=false;
    }
    const t=setTimeout(checar, 8000);               // primeira checagem 8s após abrir
    const iv=setInterval(checar, 10*60*1000);       // depois, a cada 10 min
    const onFoco=()=>{ if(!document.hidden) checar(); };
    document.addEventListener('visibilitychange', onFoco);
    return ()=>{ vivo=false; clearTimeout(t); clearInterval(iv); document.removeEventListener('visibilitychange', onFoco); };
  },[]);
  if(!nova) return null;
  const atualizar=()=>{ try{ sessionStorage.clear(); }catch(_){} location.replace(location.pathname+'?v='+nova+location.hash); };
  return html`<div style=${{position:'fixed',left:'50%',transform:'translateX(-50%)',bottom:'18px',zIndex:9999,
      display:'flex',alignItems:'center',gap:'12px',padding:'12px 16px',borderRadius:'14px',color:'#fff',
      background:'linear-gradient(135deg,var(--plum,#5e3a56),var(--violet,#8e2cb0))',boxShadow:'0 12px 30px -10px rgba(0,0,0,.5)',maxWidth:'92vw'}}>
    <span style=${{fontSize:'.9rem'}}>✨ Uma versão novinha do seu sistema está pronta.</span>
    <button onClick=${atualizar} style=${{background:'#fff',color:'var(--plum,#5e3a56)',border:'none',borderRadius:'9px',
      padding:'8px 14px',fontWeight:700,cursor:'pointer',whiteSpace:'nowrap'}}>Atualizar agora</button>
  </div>`;
}

function Login(){

function EsqueciSenha({onClose}){
  const [u,setU]=useState(''),[busy,setBusy]=useState(false),[ok,setOk]=useState(false);
  async function enviar(){
    const val=(u||'').trim(); if(!val){ toast('Informe seu e-mail cadastrado.','err'); return; }
    if(!/^[^@\s]+@[^@\s]+\.[^@\s]+$/.test(val)){ toast('Para recuperar a senha, informe o seu e-mail (não o nome de usuário).','err'); return; }
    setBusy(true);
    const mail=val;
    const redirect=location.origin+location.pathname;
    const {error}=await db.auth.resetPasswordForEmail(mail,{redirectTo:redirect});
    setBusy(false);
    if(error){ toast('Não foi possível enviar agora. Tente novamente em instantes.','err'); return; }
    setOk(true);
  }
  return html`<${Modal} title="Recuperar acesso" onClose=${onClose} footer=${ok
    ? html`<button class="btn pri" onClick=${onClose}>Entendi</button>`
    : html`<${Fragment}><button class="btn" onClick=${onClose}>Cancelar</button>

    ${ok
      ? html`<p style=${{marginTop:0,color:'#5a525c'}}>Se houver uma conta com esse e-mail, enviamos um <b>link para redefinir a senha</b>. Confira a caixa de entrada (e o spam). Ao abrir o link, você cria uma nova senha e já entra no sistema.</p>`
      : html`<${Fragment}>
          <p style=${{marginTop:0,color:'#5a525c'}}>Informe o <b>e-mail cadastrado</b> e enviaremos um link para você criar uma nova senha.</p>

          <input type="email" autocapitalize="none" autocorrect="off" spellcheck="false" value=${u} onInput=${e=>setU(e.target.value)} placeholder="seu@email.com"/>
        </${Fragment}>`}
  </${Modal}>`;
}
function ResetSenha({onDone}){
  const [s1,setS1]=useState(''),[s2,setS2]=useState(''),[show,setShow]=useState(false),[busy,setBusy]=useState(false);
  async function salvar(e){ if(e) e.preventDefault();
    if((s1||'').length<6){ toast('A senha deve ter ao menos 6 caracteres.','err'); return; }
    if(s1!==s2){ toast('As senhas não coincidem.','err'); return; }
    setBusy(true);
    const {error}=await db.auth.updateUser({password:s1});
    if(error){ setBusy(false); toast('Erro ao salvar: '+error.message,'err'); return; }
    try{ const {data}=await db.auth.getUser(); if(data&&data.user) await db.from('profiles').update({trocar_senha:false}).eq('id',data.user.id); }catch(_){}
    setBusy(false); toast('Senha redefinida! Você já está no sistema.','ok');
    try{ history.replaceState(null,'',location.pathname); }catch(_){}
    onDone();
  }
  return html`<${Fragment}><${LivingBg}/><div class="center"><div class="glass card">
    <div style=${{display:'grid',placeItems:'center',marginBottom:'10px'}}><${BrandLogo} size=${100}/></div>

  if(!locked) return null;
  async function desbloquear(e){
    e&&e.preventDefault();
    if(!senha) return;
    setBusy(true); setErro('');

    setLocked(false);
  }
  return html`<div class="lockscr">

      <${Avatar} nome=${profile?.nome} url=${profile?.avatar_url} cls="lg"/>

}

function PerfilModal({onClose}){
  const {profile,role,tenantId,email,refreshProfile}=useApp();
  const [nome,setNome]=useState(profile?.nome||'');
  const [arquivo,setArquivo]=useState(null);        // §8.1: só sobe ao salvar
  const [previa,setPrevia]=useState(profile?.avatar_url||'');
  const [s1,setS1]=useState(''),[s2,setS2]=useState('');
  const [busy,setBusy]=useState(false);

  function escolherFoto(e){
    const f=e.target.files&&e.target.files[0]; if(e.target) e.target.value='';
    if(!f) return;
    if(!/^image\//.test(f.type)){ toast('Escolha uma imagem.','err'); return; }
    if(f.size>3*1024*1024){ toast('A foto precisa ter no máximo 3 MB.','err'); return; }
    setArquivo(f); setPrevia(URL.createObjectURL(f));   // prévia local, nada sobe ainda
  }

  async function salvar(){
    if(!nome.trim()){ toast('Escreva seu nome.','err'); return; }
    setBusy(true);
    try{
      let avatar_url=profile?.avatar_url||null;
      if(arquivo){
        const blob=await resizeImage(arquivo,512,.85);
        const ext=(blob.type.split('/')[1]||'jpg').replace('jpeg','jpg');
        /* §8.1: <tenant>/<user>-<timestamp>.<ext> — nome único, então nunca sobrescreve nada */
        const caminho=(tenantId||'sem-tenant')+'/'+profile.id+'-'+Date.now()+'.'+ext;
        const up=await db.storage.from('avatars').upload(caminho,blob,{contentType:blob.type,upsert:false});
        if(up.error) throw up.error;
        avatar_url=db.storage.from('avatars').getPublicUrl(caminho).data.publicUrl;
      }
      const {error}=await db.from('profiles').update({nome:nome.trim(),avatar_url}).eq('id',profile.id);
      if(error) throw error;

      if(s1||s2){
        if(s1.length<6) throw new Error('A senha nova precisa ter pelo menos 6 caracteres.');
        if(s1!==s2) throw new Error('As duas senhas não são iguais.');
        const r=await db.auth.updateUser({password:s1});
        if(r.error) throw r.error;
        toast('Perfil e senha atualizados.','ok');
      } else toast('Perfil atualizado.','ok');

      if(refreshProfile) await refreshProfile();
      onClose();
    }catch(err){ toast('Não consegui salvar: '+(err.message||err),'err'); }
    setBusy(false);
  }

  return html`<${Modal} title="Meu perfil" onClose=${onClose} footer=${html`<${Fragment}>
      <button class="btn" onClick=${onClose}>Cancelar</button>
      <button class="btn pri" disabled=${busy} onClick=${salvar}>${busy?'Salvando…':'Salvar'}</button></${Fragment}>`}>

    <div style=${{display:'flex',gap:'16px',alignItems:'center',marginBottom:'16px'}}>
      <${Avatar} nome=${nome} url=${previa} cls="lg"/>
      <div>
        <label class="btn sm" style=${{cursor:'pointer',display:'inline-flex'}}>
          <${Ic} d=${I.camera}/>${previa?'Trocar foto':'Colocar foto'}
          <input type="file" accept="image/*" style=${{display:'none'}} onChange=${escolherFoto}/>
        </label>
        ${previa&&html`<button class="link" style=${{marginLeft:'10px'}}
          onClick=${()=>{ setArquivo(null); setPrevia(''); }}>remover</button>`}
        <div class="muted" style=${{fontSize:'.72rem',marginTop:'6px'}}>JPG ou PNG, até 3 MB.</div>
      </div>
    </div>

    <div><label>Nome</label><input value=${nome} onInput=${e=>setNome(e.target.value)} placeholder="Seu nome"/></div>

    <div class="f2" style=${{marginTop:'10px'}}>
      <div><label>E-mail</label><input value=${email||'—'} disabled/></div>
      <div><label>Perfil de acesso</label><input value=${PAPEL[role]||role} disabled/></div>
    </div>
    <div class="muted" style=${{fontSize:'.72rem',marginTop:'6px'}}>
      O e-mail e o perfil de acesso são definidos pela administração do sistema.</div>

    <div style=${{marginTop:'18px',paddingTop:'14px',borderTop:'1px solid var(--border)'}}>
      <div style=${{display:'flex',alignItems:'center',gap:'8px',marginBottom:'8px'}}>
        <${Ic} d=${I.key} style=${{width:'16px',height:'16px',color:'var(--muted)'}}/>
        <b style=${{fontSize:'.88rem'}}>Trocar minha senha</b></div>
      <div class="f2">
        <div><label>Nova senha</label><input type="password" value=${s1} onInput=${e=>setS1(e.target.value)} placeholder="Mínimo 6 caracteres"/></div>
        <div><label>Repita a nova senha</label><input type="password" value=${s2} onInput=${e=>setS2(e.target.value)}/></div>
      </div>
      <div class="muted" style=${{fontSize:'.72rem',marginTop:'6px'}}>Deixe em branco para manter a senha atual.</div>
    </div>
  </${Modal}>`;
}

/* ---------- data hook ---------- */
function useRows(table, {order='created_at', asc=false, select='*', deps=[]}={}){
  const [rows,setRows]=useState(null); const [n,setN]=useState(0);
  const reload=useCallback(()=>setN(x=>x+1),[]);
  useEffect(()=>{ let live=true; (async()=>{
    setRows(null);
    let q=db.from(table).select(select); if(order) q=q.order(order,{ascending:asc});
    const {data,error}=await q; if(!live) return;
    if(error){ toast('Erro ao carregar: '+error.message,'err'); setRows([]); } else setRows(data||[]);
  })(); return ()=>{live=false;}; },[table,n,...deps]);
  return [rows,reload];
}

  const sub=(it)=>(Number(it.quantidade)||0)*(Number(it.valor_unit)||0);
  const total=(itens||[]).reduce((a,it)=>a+sub(it),0);
  const descV=Math.min(Math.max(Number(f.desconto)||0,0), total||0);
  const netV=+((total||0)-descV).toFixed(2);
  const pagoV=Math.max(Number(f.valor_pago)||0,0);
  const saldoV=+(netV-pagoV).toFixed(2);
  async function save(){
    const validos=(itens||[]).filter(it=>(it.descricao||'').trim() && it.valor_unit!=='' && !isNaN(Number(it.valor_unit)));
    if(validos.length===0){ setErr({itens:'Adicione ao menos um serviço com descrição e valor.'}); toast('Adicione ao menos um serviço com descrição e valor.','err'); return; }
    setErr({}); setBusy(true);

    const resumo=validos.map(it=>it.descricao.trim()).join(' + ');
    const desc=Math.min(Math.max(Number(f.desconto)||0,0), total);

    const pago=Math.max(Number(f.valor_pago)||0,0);
    const payload={ tenant_id:tenantId, cliente_id:f.cliente_id||null, descricao:resumo, valor:net, desconto:desc, valor_pago:pago,
      status:f.status, data_entrada:f.data_entrada||todayISO(), prazo:prazoCalc, dias_previstos:dias, data_prova:f.data_prova||null,

      res=await db.from('ordens').update(payload).eq('id',row.id); }
    else { if(f.status==='entregue') payload.entregue_em=new Date().toISOString();
      const ins=await db.from('ordens').insert(payload).select('id,numero').maybeSingle(); res=ins; ordemId=ins.data?.id; }
    if(res.error){ setBusy(false); toast('Erro: '+res.error.message,'err'); return; }

            <option value="">— avulso —</option>${servicos.map(s=>html`<option key=${s.id} value=${s.id}>${s.nome} · ${BRL(s.preco_base)}</option>`)}</select>
          <input style=${{flex:'2 1 160px'}} placeholder="Descrição" value=${it.descricao} onInput=${e=>upItem(i,'descricao',e.target.value)}/>

          <span class="b" style=${{minWidth:'74px',textAlign:'right'}}>${BRL(sub(it))}</span>
          <button class="btn sm ghost" type="button" title="Remover" onClick=${()=>rmItem(i)}>×</button>
        </div>`)}
      </div>`}
    <button class="btn sm" type="button" style=${{marginTop:'8px'}} onClick=${addItem}>+ Adicionar serviço</button>
    ${err.itens&&html`<div class="ferr">${err.itens}</div>`}
    <div class="f3" style=${{marginTop:'10px'}}>

function Relatorios(){
  const {tenant}=useApp();
  const [data,setData]=useState(null);
  const [ini,setIni]=useState(monthStart()),[fim,setFim]=useState(todayISO());
  const load=useCallback(async()=>{
    setData(null);
    const [rOs,rCli,rFin]=await Promise.all([
      db.from('ordens').select('*'),
      db.from('clientes').select('id,nome'),
      db.from('financeiro_lancamentos').select('tipo,valor,pago,pago_em,descricao,vencimento'),
    ]);
    const os=qd(rOs,'as ordens')||[], cli=qd(rCli,'as clientes')||[], fin=qd(rFin,'o financeiro')||[];
    const cn=Object.fromEntries((cli||[]).map(c=>[c.id,c.nome]));
    const inRange=o=>o.data_entrada>=ini&&o.data_entrada<=fim;
    const per=(os||[]).filter(inRange);
    const receita=per.reduce((a,o)=>a+Number(o.valor||0),0);
    const porStatus=STATUS_ORDER.map(s=>[s,per.filter(o=>o.status===s).length]).filter(([,c])=>c>0);
    const topServ=Object.entries(per.reduce((m,o)=>{const k=(o.descricao||'Sem descrição').trim();m[k]=m[k]||{c:0,v:0};m[k].c++;m[k].v+=Number(o.valor||0);return m;},{})).sort((a,b)=>b[1].c-a[1].c).slice(0,8);
    const topCli=Object.entries((os||[]).reduce((m,o)=>{if(!o.cliente_id)return m;m[o.cliente_id]=(m[o.cliente_id]||0)+1;return m;},{})).map(([id,c])=>[cn[id]||'—',c]).sort((a,b)=>b[1]-a[1]).slice(0,8);
    const durs=per.filter(o=>o.entregue_em&&o.data_entrada).map(o=>daysBetween(o.data_entrada,o.entregue_em.slice(0,10))).filter(d=>d>=0);
    const tempoMedio=durs.length?(durs.reduce((a,b)=>a+b,0)/durs.length).toFixed(1):null;
    setData({qtd:per.length,receita,porStatus,topServ,topCli,tempoMedio,per,cn,fin:fin||[],ini,fim});
  },[ini,fim]);
  useEffect(()=>{load();},[]);
  const periodo = data? fmtDate(data.ini)+' a '+fmtDate(data.fim) : '';
  const printEntradas=()=>{ const rows=data.per.slice().sort((a,b)=>a.data_entrada.localeCompare(b.data_entrada));
    const tot=rows.reduce((s,o)=>s+Number(o.valor||0),0);

function EmitirNfse({ordem, portal, onClose, onDone}){
  const [num,setNum]=useState(''),[busy,setBusy]=useState(false);
  const disc=(ordem.descricao||'Serviço de costura')+' — Ref. OS #'+ordem.numero;
  async function marcar(){
    if(!num.trim()){ toast('Informe o número da NFS-e emitida.','err'); return; }
    setBusy(true);
    const {error}=await db.from('ordens').update({nfse_emitida:true, nfse_numero:num.trim(), nfse_emitida_em:new Date().toISOString()}).eq('id',ordem.id);
    setBusy(false);
    if(error){ toast('Erro ao registrar: '+error.message,'err'); return; }
    toast('NFS-e registrada!','ok'); onDone();
  }
  function copiar(){ try{ navigator.clipboard.writeText(disc); toast('Discriminação copiada.','ok'); }catch(_){ toast('Copie manualmente.','err'); } }
  return html`<${Modal} title=${'Emitir NFS-e — OS #'+ordem.numero} onClose=${onClose} footer=${html`<${Fragment}>
    <a class="btn pri" href=${portal} target="_blank" rel="noopener">Abrir Emissor Nacional</a>
    <button class="btn" disabled=${busy} onClick=${marcar}>${busy?'…':'Registrar nº da nota'}</button></${Fragment}>`}>
    <p style=${{marginTop:0,color:'#5a525c',fontSize:'.9rem'}}>Emita a nota no <b>Portal Nacional</b> com os dados abaixo e depois registre o número aqui, para controle.</p>
    <div class="stat-list">
      <div class="it"><span>Tomador</span><span class="v">${ordem.cliente?.nome||'Consumidor não identificado'}</span></div>
      ${ordem.cliente?.cpf?html`<div class="it"><span>CPF/CNPJ</span><span class="v">${ordem.cliente.cpf}</span></div>`:''}
      <div class="it"><span>Valor do serviço</span><span class="v">${BRL(ordem.valor)}</span></div>
    </div>
    <label style=${{marginTop:'10px'}}>Discriminação do serviço</label>
    <div class="field"><input type="text" readOnly value=${disc} onFocus=${e=>e.target.select()}/><button type="button" class="toggle" onClick=${copiar}>copiar</button></div>
    <label style=${{marginTop:'10px'}}>Número da NFS-e (após emitir no portal)</label>
    <input type="text" value=${num} onInput=${e=>setNum(e.target.value)} placeholder="ex.: 000123"/>
  </${Modal}>`;
}

    const hoje=todayISO();
    const inativos=(cli||[]).map(c=>{ const b=by[c.id]; return {...c, dias:b&&b.last?daysBetween(b.last,hoje):null, total:b?b.total:0, n:b?b.n:0}; })
      .filter(c=>c.n>0 && c.dias!=null && c.dias>=60).sort((a,b)=>b.dias-a.dias);
    setD({inativos, orcamentos:(os||[]).filter(o=>o.status==='orcamento'), cancel:(os||[]).filter(o=>o.status==='cancelado')});
  })(); },[]);
  const msg=c=>encodeURIComponent('Olá '+((c.nome||'').split(' ')[0])+'! Sentimos sua falta no ateliê. Faz um tempinho que você não aparece — tem alguma peça esperando um ajuste? Estou à disposição. — '+(tenant?.nome||''));
  return html`<${Shell} title="Recuperação de receita">
    <div class="hint">Reative clientes parados e resgate orçamentos que não fecharam — receita que já estava ao seu alcance.</div>
    ${!d? html`<div class="hint">Carregando…</div>`: html`<${Fragment}>
      <div class="grid">
        <div class="glass kpi" style=${{cursor:'default'}}><div class="n">${d.inativos.length}</div><div class="l">Inativos (60+ dias)</div></div>
        <button class="kpi" onClick=${()=>go('/ordens?f=orcamento')}><div class="n">${d.orcamentos.length}</div><div class="l">Orçamentos em aberto</div></button>
        <div class="glass kpi" style=${{cursor:'default'}}><div class="n" style=${{fontSize:'1.5rem'}}>${BRL(d.inativos.reduce((a,c)=>a+c.total,0))}</div><div class="l">Já gasto pelos inativos</div></div>
        <button class="kpi" onClick=${()=>go('/ordens?f=cancelado')}><div class="n">${d.cancel.length}</div><div class="l">OS canceladas</div></button>
      </div>
      <div class="glass panel" style=${{marginTop:'18px'}}>
        <h3>Clientes para reconquistar</h3><p class="desc">Sem voltar há 60 dias ou mais — comece pelos que mais gastaram.</p>
        ${d.inativos.length===0? html`<${Empty} icon=${I.refresh} title="Ninguém parado">Seus clientes estão ativos.</${Empty}>`
          : html`<div class="tblwrap"><table class="tbl"><thead><tr><th>Cliente</th><th class="r">Sem voltar</th><th class="r">Serviços</th><th class="r">Total gasto</th><th class="r">Ação</th></tr></thead>
            <tbody>${d.inativos.map(c=>html`<tr key=${c.id}><td class="b">${c.nome}</td><td class="r">${c.dias} dias</td><td class="r">${c.n}</td><td class="r b">${BRL(c.total)}</td>
              <td class="r">${c.whatsapp? html`<a class="btn sm wa" target="_blank" href=${'https://wa.me/55'+onlyDigits(c.whatsapp)+'?text='+msg(c)}><${IcWA}/>Reconquistar</a>`: html`<span class="muted" style=${{fontSize:'.72rem'}}>sem WhatsApp</span>`}</td></tr>`)}</tbody></table></div>`}
      </div>
    </${Fragment}>`}
  </${Shell}>`;
}

/* ========== ALAVANCAGEM ========== */
function Alavancagem(){
  const {tenant}=useApp();
  const [clientes]=useRows('clientes',{order:'nome',asc:true});
  const [servicos]=useRows('servicos',{order:'nome',asc:true});
  const [counts,setCounts]=useState({});
  const [seg,setSeg]=useState('todos'),[servId,setServId]=useState(''),[desc,setDesc]=useState(15);
  useEffect(()=>{ (async()=>{ const os=qd(await db.from('ordens').select('cliente_id'), 'as ordens das clientes'); const m={}; (os||[]).forEach(o=>{ if(o.cliente_id) m[o.cliente_id]=(m[o.cliente_id]||0)+1; }); setCounts(m); })(); },[]);
  const serv=(servicos||[]).find(s=>s.id===servId);
  const preco=serv?Number(serv.preco_base):0, precoDesc=preco*(1-Number(desc||0)/100);
  const alvo=useMemo(()=>{ let list=(clientes||[]).filter(c=>c.whatsapp);
    if(seg==='aniversariantes') list=list.filter(bdayThisMonth);
    if(seg==='frequentes') list=list.filter(c=>(counts[c.id]||0)>=3);
    if(seg==='novos') list=list.filter(c=>(counts[c.id]||0)<=1);
    return list; },[clientes,seg,counts]);
  const msg=c=>encodeURIComponent('Olá '+((c.nome||'').split(' ')[0])+'! Oferta especial pra você'
    +(serv? ' em '+serv.nome+': de '+BRL(preco)+' por '+BRL(precoDesc)+' ('+desc+'% off)':' aqui no ateliê')+'. Vamos agendar? — '+(tenant?.nome||''));
  return html`<${Shell} title="Alavancagem">
    <div class="hint">Gere mais receita da base atual: escolha um público, um serviço e um desconto, e dispare a oferta por WhatsApp.</div>
    <div class="glass panel">
      <label>Público-alvo</label>
      <div class="seg" style=${{marginBottom:'10px'}}>
        ${[['todos','Todos'],['aniversariantes','Aniversariantes do mês'],['frequentes','Frequentes (3+)'],['novos','Novos (1 visita)']].map(([k,l])=>html`<button key=${k} class=${'chip'+(seg===k?' on':'')} onClick=${()=>setSeg(k)}>${l}</button>`)}
      </div>
      <div class="f2">
        <div><label>Serviço em oferta</label><select value=${servId} onInput=${e=>setServId(e.target.value)}><option value="">— Oferta genérica —</option>${(servicos||[]).map(s=>html`<option key=${s.id} value=${s.id}>${s.nome} · ${BRL(s.preco_base)}</option>`)}</select></div>
        <div><label>Desconto (%)</label><input type="number" min="0" max="90" value=${desc} onInput=${e=>setDesc(e.target.value)}/></div>
      </div>
      ${serv&&html`<div class="notice" style=${{marginTop:'12px'}}>${serv.nome}: de <b>${BRL(preco)}</b> por <b>${BRL(precoDesc)}</b> (${desc}% off).</div>`}
    </div>
    <div class="glass panel" style=${{marginTop:'16px'}}>
      <h3>Clientes no público (${alvo.length})</h3><p class="desc">Cada disparo abre o WhatsApp com a mensagem pronta.</p>
      ${alvo.length===0? html`<${Empty} icon=${I.rocket} title="Nenhum cliente">Ajuste o público ou cadastre WhatsApp nos clientes.</${Empty}>`
        : html`<div class="tblwrap"><table class="tbl"><thead><tr><th>Cliente</th><th class="r">Serviços feitos</th><th class="r">Enviar oferta</th></tr></thead>
          <tbody>${alvo.map(c=>html`<tr key=${c.id}><td class="b">${c.nome}</td><td class="r">${counts[c.id]||0}</td>
            <td class="r"><a class="btn sm wa" target="_blank" href=${'https://wa.me/55'+onlyDigits(c.whatsapp)+'?text='+msg(c)}><${IcWA}/>Oferecer</a></td></tr>`)}</tbody></table></div>`}
    </div>
  </${Shell}>`;
}

/* ========== AGENDA (módulo padrão VIZIO §16 · arrastar §15) ==========
   Referência viva: Inovar Formaturas (app-pauta.js). Duas diferenças deliberadas:
   1) persistência em tabela com tenant_id + RLS (o Inovar usa localStorage, que prende
      a pauta no aparelho e não acompanha a usuária);
   2) Seg–Sáb, porque ateliê atende sábado.
   Arrastar NUNCA é o único caminho: cada cartão tem os botões "Manhã/Tarde/Noite" e
   "◀ ▶" de dia — no celular o drag nativo não é confiável. */
const AG_PERIODOS=[['manha','Manhã','🌅'],['tarde','Tarde','☀️'],['noite','Noite','🌙']];
const agPeriodoAtual=()=>{ const h=new Date().getHours(); return h<12?'manha':(h<18?'tarde':'noite'); };
const agNomePer=p=>(AG_PERIODOS.find(x=>x[0]===p)||[,'—'])[1];
const agYmd=d=>{ const x=new Date(d); return x.getFullYear()+'-'+String(x.getMonth()+1).padStart(2,'0')+'-'+String(x.getDate()).padStart(2,'0'); };
const agSegunda=d=>{ const x=new Date(d); const w=x.getDay(); x.setDate(x.getDate()+(w===0?-6:1-w)); x.setHours(0,0,0,0); return x; };
const AG_DIAS=['Segunda','Terça','Quarta','Quinta','Sexta','Sábado'];

function Agenda(){
  const {tenantId}=useApp();
  const [semana,setSemana]=useState(0);
  const [rows,setRows]=useState(null);
  const [edit,setEdit]=useState(null);      // {id?,dia,periodo,titulo,observacoes}
  const [del,setDel]=useState(null);
  const [arrastando,setArrastando]=useState(null);
  const [alvo,setAlvo]=useState(null);      // 'YYYY-MM-DD|periodo' realçado

  const dias=useMemo(()=>{ const seg=agSegunda(new Date()); seg.setDate(seg.getDate()+semana*7);
    return AG_DIAS.map((nome,i)=>{ const d=new Date(seg); d.setDate(seg.getDate()+i); return {nome,data:d,ymd:agYmd(d)}; }); },[semana]);
  const hojeYmd=agYmd(new Date()), perAtual=agPeriodoAtual();

  const carregar=useCallback(async()=>{
    if(!tenantId) return;
    const data=qd(await db.from('agenda_atividades').select('*')
      .gte('dia',dias[0].ymd).lte('dia',dias[dias.length-1].ymd)
      .order('ordem',{ascending:true}).order('created_at',{ascending:true}), 'a agenda');
    setRows(data||[]);
  },[tenantId,dias]);
  useEffect(()=>{ carregar(); },[carregar]);

  /* move = alterar dia e/ou período. Usado pelo arrasto E pelos botões (acessibilidade). */
  async function mover(at,novoDia,novoPer){
    if(at.dia===novoDia && at.periodo===novoPer) return;          // §15: soltar no mesmo lugar não faz nada
    setRows(rs=>rs.map(r=>r.id===at.id?{...r,dia:novoDia,periodo:novoPer}:r));   // otimista
    const {error}=await db.from('agenda_atividades').update({dia:novoDia,periodo:novoPer}).eq('id',at.id);
    if(error){ toast('Não consegui mover a atividade. '+(error.message||''),'err'); carregar(); }
  }
  async function alternarFeito(at){
    const novo=at.status==='concluida'?'pendente':'concluida';
    setRows(rs=>rs.map(r=>r.id===at.id?{...r,status:novo}:r));
    const {error}=await db.from('agenda_atividades').update({status:novo}).eq('id',at.id);
    if(error){ toast('Não consegui atualizar. '+(error.message||''),'err'); carregar(); }
  }
  async function salvar(f){
    const payload={titulo:(f.titulo||'').trim(),observacoes:f.observacoes||null,dia:f.dia,periodo:f.periodo};
    if(!payload.titulo){ toast('Escreva o que precisa ser feito.','err'); return false; }
    const r = f.id ? await db.from('agenda_atividades').update(payload).eq('id',f.id)
                   : await db.from('agenda_atividades').insert({...payload,tenant_id:tenantId});
    if(r.error){ toast('Erro ao salvar: '+r.error.message,'err'); return false; }
    toast(f.id?'Atividade atualizada.':'Atividade criada.','ok'); carregar(); return true;
  }
  async function excluir(at){
    const {error}=await db.from('agenda_atividades').delete().eq('id',at.id);
    if(error) toast('Erro ao excluir: '+error.message,'err'); else { toast('Atividade removida.','ok'); carregar(); }
  }

  const rotulo=dias.length?`${dias[0].data.getDate()}/${String(dias[0].data.getMonth()+1).padStart(2,'0')} a ${dias[5].data.getDate()}/${String(dias[5].data.getMonth()+1).padStart(2,'0')}`:'';
  const total=(rows||[]).length, feitas=(rows||[]).filter(r=>r.status==='concluida').length;

  return html`<${Shell} title="Agenda">
    <div class="hint">Organize seu dia: crie atividades e <b>arraste</b> para outro dia ou período. Clique para editar.</div>

    <div class="ag-foco">
      <span>⏰ Agora é <b>${agNomePer(perAtual)}</b> — foque nas atividades deste período.</span>
      <span style=${{marginLeft:'auto',color:'var(--muted)',fontSize:'.8rem'}}>
        ${total} atividade${total===1?'':'s'} na semana${total?` · ${feitas} concluída${feitas===1?'':'s'}`:''}</span>
    </div>

    <div class="bar" style=${{marginBottom:'12px'}}>
      <button class="btn sm" onClick=${()=>setSemana(s=>s-1)} title="Semana anterior">‹</button>
      <button class="btn sm" onClick=${()=>setSemana(0)}>Hoje</button>
      <button class="btn sm" onClick=${()=>setSemana(s=>s+1)} title="Próxima semana">›</button>
      <span class="muted" style=${{fontSize:'.82rem'}}>Semana de ${rotulo}</span>
      <button class="btn pri sm" style=${{marginLeft:'auto'}}
        onClick=${()=>setEdit({dia:hojeYmd,periodo:perAtual,titulo:'',observacoes:''})}>
        <${Ic} d=${I.plus}/>Nova atividade</button>
    </div>

    ${rows===null? html`<div class="hint">Carregando…</div>` : html`
    <div class="ag-week">
      ${dias.map(d=>{
        const ehHoje=d.ymd===hojeYmd;
        return html`<div class=${'ag-day'+(ehHoje?' hoje':'')} key=${d.ymd}>
          <div class="ag-day-h">
            <b>${d.nome}</b><span class="dt">${String(d.data.getDate()).padStart(2,'0')}/${String(d.data.getMonth()+1).padStart(2,'0')}</span>
            <button class="add" title=${'Nova atividade em '+d.nome}
              onClick=${()=>setEdit({dia:d.ymd,periodo:perAtual,titulo:'',observacoes:''})}>+</button>
          </div>
          ${AG_PERIODOS.map(([pid,plabel,pic])=>{
            const itens=(rows||[]).filter(r=>r.dia===d.ymd&&r.periodo===pid);
            const chave=d.ymd+'|'+pid, ehAgora=ehHoje&&pid===perAtual;
            return html`<div key=${pid}
              class=${'ag-per'+(ehAgora?' cur':'')+(alvo===chave?' drop-ok':'')}
              onDragOver=${e=>{ e.preventDefault(); if(alvo!==chave) setAlvo(chave); }}
              onDragLeave=${e=>{ if(!e.currentTarget.contains(e.relatedTarget)&&alvo===chave) setAlvo(null); }}
              onDrop=${e=>{ e.preventDefault(); setAlvo(null);
                let id=arrastando; try{ const t=e.dataTransfer.getData('text/agenda-id')||e.dataTransfer.getData('text/plain')||''; if(/^ag:(.+)$/.test(t)) id=RegExp.$1; }catch(_){ }
                if(!id) return;                                    /* §15: tipo que não entendo, ignoro */
                const at=(rows||[]).find(r=>r.id===id); if(at) mover(at,d.ymd,pid); }}>
              <div class="ag-per-h">
                <span>${pic} ${plabel}</span>
                ${ehAgora&&html`<span class="agora">agora</span>`}
                <span class="n">${itens.length}</span>
              </div>
              <div class="ag-per-body">
                ${itens.length===0? html`<div class="ag-vazio">—</div>`
                : itens.map(at=>html`<div key=${at.id}
                    class=${'ag-card'+(at.status==='concluida'?' feito':'')+(arrastando===at.id?' dragging':'')}
                    draggable=${true}
                    onDragStart=${e=>{ setArrastando(at.id);
                      try{ e.dataTransfer.setData('text/agenda-id',at.id); e.dataTransfer.setData('text/plain','ag:'+at.id); e.dataTransfer.effectAllowed='move'; }catch(_){ } }}
                    onDragEnd=${()=>{ setArrastando(null); setAlvo(null); }}>
                    <div class="t" onClick=${()=>setEdit({id:at.id,dia:at.dia,periodo:at.periodo,titulo:at.titulo,observacoes:at.observacoes||''})}
                      style=${{cursor:'pointer'}} title="Clique para editar">${at.titulo}</div>
                    ${at.observacoes&&html`<div class="o">${at.observacoes}</div>`}
                    <div class="acts">
                      <button onClick=${()=>alternarFeito(at)} title=${at.status==='concluida'?'Reabrir':'Marcar como concluída'}>
                        ${at.status==='concluida'?'↩ reabrir':'✓ concluir'}</button>
                      ${AG_PERIODOS.filter(([q])=>q!==at.periodo).map(([q,ql])=>html`
                        <button key=${q} title=${'Mover para '+ql} onClick=${()=>mover(at,at.dia,q)}>${ql.slice(0,1)}</button>`)}
                      <button title="Excluir" onClick=${()=>setDel(at)}>🗑</button>
                    </div>
                  </div>`)}
              </div>
            </div>`;
          })}
        </div>`;
      })}
    </div>`}

    ${edit&&html`<${AgendaForm} row=${edit} dias=${dias} onClose=${()=>setEdit(null)} onSave=${salvar}/>`}
    ${del&&html`<${Confirm} danger text=${'Excluir "'+del.titulo+'"?'} onClose=${()=>setDel(null)} onYes=${()=>excluir(del)}/>`}
  </${Shell}>`;
}

function AgendaForm({row,dias,onClose,onSave}){
  const [f,setF]=useState({...row});
  const [busy,setBusy]=useState(false);
  const set=(k,v)=>setF(o=>({...o,[k]:v}));
  return html`<${Modal} title=${f.id?'Editar atividade':'Nova atividade'} onClose=${onClose} footer=${html`<${Fragment}>
      <button class="btn" onClick=${onClose}>Cancelar</button>
      <button class="btn pri" disabled=${busy} onClick=${async()=>{ setBusy(true); const ok=await onSave(f); setBusy(false); if(ok) onClose(); }}>
        ${busy?'Salvando…':'Salvar'}</button></${Fragment}>`}>
    <div><label>O que precisa ser feito *</label>
      <input value=${f.titulo} autoFocus onInput=${e=>set('titulo',e.target.value)} placeholder="Ex.: Cortar o vestido da Roberta"/></div>
    <div class="f2" style=${{marginTop:'10px'}}>
      <div><label>Dia</label>
        <select value=${f.dia} onInput=${e=>set('dia',e.target.value)}>
          ${dias.map(d=>html`<option key=${d.ymd} value=${d.ymd}>${d.nome} · ${String(d.data.getDate()).padStart(2,'0')}/${String(d.data.getMonth()+1).padStart(2,'0')}</option>`)}
        </select></div>
      <div><label>Período</label>
        <select value=${f.periodo} onInput=${e=>set('periodo',e.target.value)}>
          ${AG_PERIODOS.map(([p,l])=>html`<option key=${p} value=${p}>${l}</option>`)}
        </select></div>
    </div>
    <div style=${{marginTop:'10px'}}><label>Observações</label>
      <textarea rows="2" value=${f.observacoes||''} onInput=${e=>set('observacoes',e.target.value)} placeholder="Opcional"></textarea></div>
  </${Modal}>`;
}

/* ========== ROUTER ========== */
function Router(){
  const h=useHash(); const [path]=h.split('?'); const seg=path.split('/').filter(Boolean);
  if(seg[0]==='clientes'&&seg[1]) return html`<${ClienteDetail} id=${seg[1]}/>`;
  if(seg[0]==='clientes') return html`<${Clientes}/>`;
  if(seg[0]==='ordens'&&seg[1]) return html`<${OrdemDetail} id=${seg[1]}/>`;
  if(seg[0]==='ordens') return html`<${Ordens}/>`;
  if(seg[0]==='servicos') return html`<${Servicos}/>`;
  if(seg[0]==='agenda') return html`<${Agenda}/>`;
  if(seg[0]==='estoque') return html`<${Estoque}/>`;
  if(seg[0]==='financeiro') return html`<${Financeiro}/>`;
  if(seg[0]==='relatorios') return html`<${Relatorios}/>`;
  if(seg[0]==='fiscal') return html`<${Fiscal}/>`;
  if(seg[0]==='recuperacao') return html`<${Recuperacao}/>`;
  if(seg[0]==='alavancagem') return html`<${Alavancagem}/>`;
  if(seg[0]==='novidades') return html`<${Novidades}/>`;
  if(seg[0]==='config') return html`<${Config}/>`;
  if(seg[0]==='master') return html`<${Master}/>`;
  return html`<${Dashboard}/>`;
}

/* ========== BILLING GATE (assinatura Stripe · reusa fin_assinaturas/criar-checkout) ========== */
function BillingGate({user}){
  const [st,setSt]=useState(null);
  const load=useCallback(async()=>{
    try{
      const pub=(typeof db.schema==='function')?db.schema('public'):db;
      const [perf,ass,cfg]=await Promise.all([
        pub.from('fin_perfis').select('is_admin').maybeSingle(),
        pub.from('fin_assinaturas').select('status,current_period_end').maybeSingle(),
        pub.from('config').select('valor').eq('chave','atelie_billing').maybeSingle(),
      ]);
      const admin=!!(perf.data&&perf.data.is_admin);
      const status=(ass.data&&ass.data.status)||'none';
      const active=status==='active'||status==='trialing';
      const pastDue=status==='past_due';
      const billing=(cfg.data&&cfg.data.valor)||{};
      const GRACE=Number(billing.grace_days!=null?billing.grace_days:45);
      const created=(user&&user.created_at)?new Date(user.created_at):null;
      const graceLeft=created?Math.ceil((created.getTime()+GRACE*86400000-Date.now())/86400000):null;
      const graceValid=GRACE>0&&graceLeft!=null&&graceLeft>0;
      setSt({admin,status,active,pastDue,graceLeft,graceValid,
        blocked:!admin&&!active&&!pastDue&&!graceValid,
        priceLabel:billing.preco_label||'Plano mensal', priceId:billing.stripe_price_id||null, coupon:billing.coupon||null});
    }catch(_){ setSt({admin:false,active:false,pastDue:false,graceValid:true,blocked:false}); } // falha aberta: nunca bloqueia
  },[user]);
  useEffect(()=>{ load(); },[user]);
  useEffect(()=>{
    const q=location.search||''; if(q.indexOf('assinatura=')<0) return;
    const ok=/assinatura=ok/.test(q);
    toast(ok?'Pagamento recebido! Ativando seu acesso…':'Checkout cancelado. Você pode assinar quando quiser.', ok?'ok':'');
    try{ history.replaceState(null,'',location.origin+location.pathname+location.hash); }catch(_){}
    if(ok){ [1500,4000,8000].forEach(ms=>setTimeout(load,ms)); }
  },[]);
  async function assinar(){
    const { data:{ session } }=await db.auth.getSession();
    if(!session){ toast('Sua sessão expirou. Entre novamente para assinar.','err'); return; }
    const back=location.origin+location.pathname;
    try{
      const r=await fetch(SUPABASE_URL+'/functions/v1/criar-checkout',{ method:'POST',
        headers:{ 'Content-Type':'application/json','apikey':SUPABASE_ANON,'Authorization':'Bearer '+session.access_token },
        body: JSON.stringify({ success_url:back+'?assinatura=ok', cancel_url:back+'?assinatura=cancelada', price_id:(st&&st.priceId)||undefined, coupon:(st&&st.coupon)||undefined }) });
      const j=await r.json().catch(()=>({}));
      if(j&&j.url) location.href=j.url; else toast('Não foi possível abrir o checkout'+(j&&j.error?': '+j.error:'.'),'err');
    }catch(_){ toast('Falha ao iniciar assinatura. Tente novamente.','err'); }
  }
  if(!st) return null;
  const showBanner=!st.admin&&!st.active&&(st.pastDue||(st.graceValid&&!st.blocked));
  const lock=html`<svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="10" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>`;
  return html`<${Fragment}>
    ${showBanner&&html`<div class=${'gate-bar '+(st.pastDue?'':'info')}>
      <span class="gd"></span>
      <span>${st.pastDue?'Pagamento pendente — regularize para manter o acesso.':'Ative sua assinatura para manter o acesso completo ao sistema.'}</span>
      <button class="gb" onClick=${assinar}>${st.pastDue?'Regularizar':'Assinar'}</button>
    </div>`}
    ${st.blocked&&html`<div class="gate-ov">
      <div class="gate-card">
        <div class="gate-ring">${lock}</div>
        <div class="gate-price">${st.priceLabel}</div>
        <h3>Assine para acessar</h3>
        <p>Seu acesso ao Ateliê Manager está pausado. Reative em segundos — seus dados continuam salvos e voltam exatamente como estavam.</p>
        <button class="gate-btn" onClick=${assinar}>Assinar agora</button>
        <button class="gate-exit" onClick=${()=>db.auth.signOut()}>Sair da conta</button>
      </div>
    </div>`}
  </${Fragment}>`;
}

/* ========== PRIMEIRO ACESSO (sugestão de trocar senha, 1x) ========== */
function FirstAccessModal({onClose}){
  const {profile}=useApp();
  const [s1,setS1]=useState(''),[s2,setS2]=useState(''),[show,setShow]=useState(false),[busy,setBusy]=useState(false);
  async function done(clearOnly){
    if(!clearOnly){
      if((s1||'').length<6){ toast('A senha deve ter ao menos 6 caracteres.','err'); return; }

    setBusy(false); if(!clearOnly) toast('Senha atualizada. Bem-vinda!','ok'); onClose();

  return html`<${Modal} title="Bem-vinda ao seu sistema!" onClose=${()=>done(true)} footer=${html`<${Fragment}>

}

/* ========== ATIVAÇÃO (primeiro acesso pós-pagamento) ========== */
function getQ(name){ try{ return new URLSearchParams(location.search).get(name); }catch(_){ return null; } }
function Ativar(){
  const token=getQ('a')||'';
  const [usuario,setUsuario]=useState(''),[s1,setS1]=useState(''),[s2,setS2]=useState('');
  const [show,setShow]=useState(false),[err,setErr]=useState(''),[busy,setBusy]=useState(false),[okMsg,setOkMsg]=useState('');
  async function submit(e){ e.preventDefault(); setErr('');
    if(!token){ setErr('Link de ativação inválido ou incompleto.'); return; }
    const u=usuario.trim();
    if(u.length<3){ setErr('Escolha um usuário com ao menos 3 caracteres.'); return; }
    if(!/^[a-zA-Z0-9._-]+$/.test(u)){ setErr('No usuário, use apenas letras, números, ponto, hífen ou sublinhado.'); return; }
    if(s1.length<6){ setErr('A senha deve ter ao menos 6 caracteres.'); return; }
    if(s1!==s2){ setErr('As senhas não coincidem.'); return; }
    setBusy(true);
    try{
      const r=await fetch(SUPABASE_URL+'/functions/v1/ativar-conta',{ method:'POST',
        headers:{ 'Content-Type':'application/json','apikey':SUPABASE_ANON,'Authorization':'Bearer '+SUPABASE_ANON },
        body: JSON.stringify({ token, username:u, senha:s1 }) });
      const j=await r.json().catch(()=>({}));
      if(!r.ok || !j.ok){ setBusy(false); setErr(j.error||'Não foi possível ativar sua conta.'); return; }
      setOkMsg('Conta criada! Entrando…');
      const { error }=await db.auth.signInWithPassword({ email:j.email, password:s1 });
      if(error){ setBusy(false); setErr('Conta criada. Use seu novo usuário e senha para entrar.'); setTimeout(()=>{ location.href=location.origin+location.pathname+'#/'; },1600); return; }
      try{ history.replaceState(null,'',location.origin+location.pathname+'#/'); }catch(_){}
      location.hash='/';
    }catch(_){ setBusy(false); setErr('Falha na ativação. Tente novamente.'); }
  }
  return html`<${Fragment}><${LivingBg}/><div class="center"><div class="glass card">
    <div style=${{display:'grid',placeItems:'center',marginBottom:'10px'}}><${BrandLogo} size=${110}/></div>
    <h1 class="title">Ative seu acesso</h1>
    <div class="sub">Crie seu usuário e senha para entrar no seu Ateliê Manager.</div>
    <form onSubmit=${submit}>
      ${err&&html`<div class="err">${err}</div>`}
      ${okMsg&&html`<div style=${{background:'rgba(63,125,82,.12)',color:'#3f7d52',padding:'8px 10px',borderRadius:'8px',fontSize:'.85rem',marginBottom:'8px'}}>${okMsg}</div>`}
      <label>Nome de usuário</label>
      <input type="text" autocapitalize="none" autocorrect="off" spellcheck="false" placeholder="ex.: costureirasalvador" value=${usuario} onInput=${e=>setUsuario(e.target.value)} required/>
      <label>Senha</label>
      <div class="field"><input type=${show?'text':'password'} placeholder="mín. 6 caracteres" value=${s1} onInput=${e=>setS1(e.target.value)} required/>
        <button type="button" class="toggle" onClick=${()=>setShow(v=>!v)}>${show?'ocultar':'mostrar'}</button></div>
      <label>Confirmar senha</label>
      <input type=${show?'text':'password'} value=${s2} onInput=${e=>setS2(e.target.value)} required/>
      <button class="primary" disabled=${busy}>${busy?'Ativando…':'Ativar e entrar'}</button>
    </form>
    <div class="foot"><${ByVizio} dark=${true}/></div>
  </div></div></${Fragment}>`;
}

    const pub=(typeof db.schema==='function')?db.schema('public'):db;
    const {data,error}=await pub.rpc('admin_monitor_acessos');
    if(error){ setErr(error.message); setRows([]); return; }
    setErr(''); setRows(data||[]);
  },[]);
  useEffect(()=>{carregar();},[]);
  const quando=x=>{ if(!x) return null; const d=new Date(String(x).replace(' ','T').replace(/([+-]\d{2})$/,'$1:00')); return isNaN(d)?null:d; };
  const fmt=x=>{ const d=quando(x); return d? d.toLocaleString('pt-BR',{day:'2-digit',month:'2-digit',year:'2-digit',hour:'2-digit',minute:'2-digit'}) : '—'; };
  const haQuanto=x=>{ const d=quando(x); if(!d) return 'nunca acessou';
    const min=Math.floor((Date.now()-d.getTime())/60000);

  return html`<div class="glass panel" style=${{marginTop:'18px'}}>

        <tbody>${rows.map(r=>{ const nunca=!r.ultimo_login; return html`<tr key=${r.user_id}>
          <td><div class="b">${r.nome||'—'}</div><div class="muted" style=${{fontSize:'.74rem'}}>${r.email}${r.papel?' · '+r.papel:''}${r.ativo===false?' · inativo':''}</div></td>
          <td>${r.atelie||'—'}</td>
          <td><div class=${nunca?'':'b'} style=${nunca?{color:'#b3452f',fontWeight:600}:null}>${haQuanto(r.ultimo_login)}</div>
              <div class="muted" style=${{fontSize:'.74rem'}}>${fmt(r.ultimo_login)}</div></td>
          <td class="r">${Number(r.sessoes_ativas)||0}</td>
          <td class="r">${Number(r.acessos_registrados)||0}</td>
          <td class="muted" style=${{fontSize:'.8rem'}}>${fmt(r.conta_criada)}</td>
        </tr>`; })}</tbody>
      </table></div>`}
    <p class="muted" style=${{fontSize:'.76rem',marginTop:'10px'}}>“Acessos” conta as aberturas do sistema registradas a partir desta versão. “Sessões” são as sessões ativas agora.</p>
  </div>`;
}

    } }catch(_){}
  })(); },[session]);
  /* §8.1: a ficha do usuário edita nome/foto — o topo precisa refletir na hora, sem F5. */
  const refreshProfile=useCallback(async()=>{
    if(!session) return;
    const {data:prof}=await db.from('profiles').select('*').eq('id',session.user.id).maybeSingle();
    if(prof) setCtx(c=>c?{...c,profile:prof}:c);
  },[session]);
  /* Memoizado de propósito: sem isto o valor do contexto seria um objeto novo a cada render
     do App, e TODO consumidor de useApp() re-renderizaria à toa. Os hooks ficam aqui em cima,
     antes dos returns antecipados abaixo — chamar hook depois de um return é bug silencioso. */
  const ctxValue=useMemo(()=> ctx?{...ctx, email:session?.user?.email||'', refreshProfile}:null,[ctx,session,refreshProfile]);
  const onAtivar=(location.hash||'').replace(/^#\/?/,'').split('?')[0].split('/')[0]==='ativar';
  if(onAtivar) return html`<${Fragment}><${Toaster}/><${Ativar}/></${Fragment}>`;
  if(recovery) return html`<${Fragment}><${Toaster}/><${ResetSenha} onDone=${()=>setRecovery(false)}/></${Fragment}>`;
  if(session===undefined) return html`<${Fragment}><${Toaster}/><div class="center"><div class="sub">Carregando…</div></div></${Fragment}>`;
  if(!session) return html`<${Fragment}><${Toaster}/><${VersionGate}/><${Login}/></${Fragment}>`;
  if(!ctx) return html`<${Fragment}><${Toaster}/><div class="center"><div class="sub">Preparando seu ateliê…</div></div></${Fragment}>`;
  const showFirst=ctx.trocarSenha&&!firstDone;
  return html`<${Ctx.Provider} value=${ctxValue}><${Toaster}/><${VersionGate}/><${BillingGate} user=${session.user}/>${showFirst?html`<${FirstAccessModal} onClose=${()=>setFirstDone(true)}/>`:(!novidDone&&html`<${NovidadeModal} onClose=${()=>setNovidDone(true)}/>`)}<${Router}/><${LockGate}/></${Ctx.Provider}>`;
}
ReactDOM.createRoot(document.getElementById('root')).render(createElement(App));
</script>
</body>
</html>
